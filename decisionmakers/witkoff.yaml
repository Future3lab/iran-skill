name: "Steve Witkoff"
role: "中东特使（Trump 任命）"
last_updated: "2026-04-14"

power_base: |
  权力来自 Trump 的个人信任（房地产行业旧同事）+ 对中东商业网络的深厚了解。
  本质上是一个中间人和交易撮合者，而非地缘战略决策者。
  失去 Trump 信任会立即失去所有权力，但当前 Trump 对他的期待很高（「能签字的交易」）。

domestic_constraints:
  - 无国会制约（特使身份），但需要向 Trump 定期汇报
  - 房地产谈判背景意味着他倾向于快速成交而非深度博弈
  - Rubio 国务卿与他在核政策上有内部张力，可能削弱他的建议权重
  - 如果谈判失败，Trump 可能迅速换人，这是他的主要压力

decision_style: |
  交易型（90%）+ 实用主义（8%）+ 风险回避（2%）。
  不关心地缘政治最优性，只关心「能否达成协议」。
  倾向于找到双方都能对外宣布为「胜利」的方案。
  公开立场反复摇摆是特征（限浓缩 → 零限浓缩 → 又回到限制），反映其作为中介的灵活心态。

red_lines:
  - "Trump 公开否定他的谈判成果 → 立即失权，可能被撤职 (★★★)"
  - "伊朗拒绝与他直接谈判 → 他会建议 Trump 采取军事行动并推卸责任 (★★☆)"
  - "任何协议被国会或盟国强烈反对 → 他倾向建议 Trump 推迟宣布 (★★☆)"

known_triggers:
  escalate:
    - "伊朗谈判代表在会谈中表现出「嘲笑」或「拒绝听取美方建议」→ Witkoff 会立即中断会谈并向 Trump 汇报「伊朗不诚意」"
    - "Trump 在推特表示对谈判失望 → Witkoff 会加速谈判进程或建议军事升级来重新获得 Trump 信任"
    - "沙特或阿联酋向 Witkoff 表示「如果伊朗得到太多让步，我们会不满」→ 他会立即要求伊朗更多妥协"
    - "谈判预期时间表内无进展 → Witkoff 倾向建议临时军事展示来「增加谈判压力」"
  deescalate:
    - "伊朗同意某个具体条款（哪怕只是技术问题）→ Witkoff 会立即向 Trump 宣布「取得突破」并建议继续谈判"
    - "中国或俄罗斯同意调停 → Witkoff 视其为谈判加速信号，倾向立即提出妥协方案"
    - "沙特 MBS 向 Witkoff 暗示「伊朗也在寻求出口」→ 他会快速设计一个「面子协议」"
    - "国内经济数据恶化或民调下滑 → Witkoff 会建议 Trump 「宣布胜利并回到经济议题」"

known_bluffs:
  - "2026-02-28 空战后立即宣布「准备全面谈判」，但无实质谈判机制提案（落差率 100%）"
  - "2026-03-15 声称「伊朗已经改变立场」基于二手情报，后被证为虚假（落差率 80%）"
  - "多次表示「已获得区域国家支持谈判」，但从未公开披露具体承诺方（落差率 70%）"

negotiation_style: |
  目标：达成任何能被标签为「协议」的文件，而不追求最优条款。
  让步时机：极快，通常在第一轮会谈后就开始给予让步，以加速过程。
  谈判中最常见的说法：「这是我能为 Trump 争取到的最好结果」（暗示无法进一步改进）。
  对伊朗的压力不是持续的深度博弈，而是「时间有限，要么现在签，要么没机会」的时间表压力。
  他倾向于分阶段协议（第一阶段快速成交，后续条款延后讨论）。

current_position: |
  2026-04-14：伊斯兰堡谈判破裂（2026-04-12），Witkoff 正在评估是否需要调整策略。
  公开立场：「伊朗需要改变态度，美国已做出充分妥协」（为自己留下后路）。
  实际动向：正在通过中东盟国秘密渠道与伊朗接触，试图了解伊朗的真实底线。
  对核协议的立场：从最初要求「彻底拆核」逐步软化为「限制核计划但不拆除」。
  最新信号：向 Trump 汇报「如果伊朗愿意冻结浓缩铀生产，可能有谈判出口」。

authorization_limit: |
  有高度授权：
  - 设计谈判框架和初步方案（Trump 会审批但通常不否决）
  - 与区域国家非正式接触（无须正式汇报）
  - 在媒体上代表 Trump 阐述对伊政策（在大方向上）

  需要 Trump 书面批准：
  - 任何正式的技术协议文本
  - 承诺伊朗任何新的经济让步或解除制裁承诺
  - 公开宣布协议达成

  需要向国务卿 Rubio 通报但不受制约：
  - 谈判进展情况（Rubio 会试图影响但 Witkoff 可绕过）

  灾难场景：
  - 如果他达成的协议 Trump 觉得「不够好」，会立即被否定并面临撤职风险

key_unknowns:
  - 他心目中什么样的「协议」能让 Trump 满意（具体条款门槛）
  - 沙特和阿联酋对谈判的真实态度是否支持他，还是暗中推动对伊强硬
  - 如果伊朗提出 Witkoff 觉得「太好"」的让步，他会立即接受还是向 Trump 验证
  - Rubio 与他的内部竞争有多激烈，是否会主动破坏他的谈判

watch_for:
  - Witkoff 是否继续定期往返中东（停止表示谈判陷入僵局）
  - 他的公开发言中「伊朗态度」的评价从负面转为「有所改善」 → 谈判升温信号
  - 是否开始强调「长期协议」而非「快速成交」→ 立场升级转向深度谈判
  - Trump 在推特上对 Witkoff 的提及频率和态度变化 → 高频率正面提及表示信任维持高位
  - 他是否开始与 Rubio 进行公开政策调和性发言 → 内部共识形成的信号

primary_sources:
  - Witkoff 在沙特、伊朗、阿联酋等国的行程安排（通过新闻报道）
  - Trump 与 Witkoff 的会见记录（White House Visitor Log）
  - Axios / Bloomberg 对白宫谈判团队的报道
  - 区域媒体（阿尔巴迪亚、中东眼）对 Witkoff 访问的反应

evidence_quality: "★★☆"
