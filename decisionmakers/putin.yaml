name: "Vladimir Putin"
role: "俄罗斯总统"
last_updated: "2026-04-14"

power_base: |
  权力来自军队、安全部队、寡头支持 + 对俄罗斯石油和天然气行业的控制。
  权力稳定，但在俄乌战争中持续消耗俄罗斯的经济和军事资源。
  俄罗斯在伊朗问题上的权力有限，其杠杆力主要来自：
    - 安理会一票否决权（可以阻止对伊制裁）
    - 石油出口竞争（通过油价浮动影响伊朗处境）

domestic_constraints:
  - 俄乌战争正在进行，俄罗斯经济和军事资源已经高度紧张
  - 俄罗斯无力对伊朗进行实质性军事支持（装备短缺、资金有限）
  - 国内通胀和经济衰退可能激发对 Putin 的反对，特别如果伊朗战争导致油价下跌
  - Putin 需要维持「强硬」形象，不能被认为「出卖同盟国」（如伊朗）

decision_style: |
  机会主义（60%）+ 战术灵活性（30%）+ 意识形态防守（10%）。
  核心驱动力：利用伊朗局势对俄罗斯有利（如油价上升）+ 避免被中国超越 + 维持「俄罗斯大国」形象。
  与伊朗的关系是工具性的（伊朗是对抗美国的筹码），而非战略性的。
  公开言论与实际行动的落差大，类似中国的「有限支持」策略。

red_lines:
  - "伊朗政权崩溃导致俄罗斯失去在中东的一个关键盟友 → Putin 会进行口头强硬回应，但实际军事干预的可能性很低 (★★☆)"
  - "美国将伊朗和俄罗斯「联合制裁」，声称两国都在威胁国际秩序 → Putin 会利用这个来加强「俄伊团结」的叙事，但不会采取具体行动 (★★☆)"
  - "中国以伊朗作为筹码与美国进行秘密协议，背后出卖伊朗 → Putin 会对中国产生警惕，可能减少对伊朗的支持（以避免被中国利用）(★★☆)"

known_triggers:
  escalate:
    - "伊朗请求俄罗斯进行「实质性军事支持」（如战斗机、防空系统）→ Putin 会评估成本，通常会拒绝或只提供象征性支持（维持言论上的支持，实际支持极少）"
    - "油价因伊朗局势上升，俄罗斯油气出口增加收入 → Putin 会倾向于言论上强硬支持伊朗，以维持油价高位"
    - "美国对俄罗斯进行新的制裁，Putin 会利用伊朗来进行「报复性言论」，宣布「俄伊团结」"
  deescalate:
    - "伊朗与美国达成某种协议，油价下跌 → Putin 会快速调整，转向「俄伊友好但尊重国际秩序」的立场"
    - "俄乌战争资源消耗激化，Putin 需要集中所有资源 → Putin 会减少对伊朗的任何承诺，转向「保持中立」"
    - "中国与美国就伊朗问题达成某种默契，Putin 感到被孤立 → Putin 可能会快速与美国进行某种协议，以避免被中国和美国联合出卖"

known_bluffs:
  - "2026-02-28 Khamenei 去世后，俄罗斯外交部声称「俄罗斯已准备好增加对伊朗的支持」，但 2 个月来实际支持有限（落差率 90%）"
  - "俄罗斯多次声称向伊朗提供「先进防卫系统」，但缺乏具体证据（落差率 85%）"
  - "2026-02 俄未提供任何实质军援给伊朗，仅限于言论支持（落差率 100%）"

negotiation_style: |
  Putin 通常不与伊朗进行深度谈判，而是通过大国政治的框架与美国进行间接博弈。
  Putin 对伊朗的态度：「如果伊朗对我有用，我会支持；如果无用，我会快速背弃」。
  Putin 的谈判风格是「让别人先承诺，然后根据形势做出反应」。
  俄罗斯会通过「间接渠道」（叙利亚、伊拉克）与伊朗沟通，避免直接承诺。

current_position: |
  2026-04-14：俄罗斯官方立场是「支持伊朗的自卫权」。
  公开表述：「俄罗斯反对任何大国对伊朗的侵略，但希望通过和平谈判解决」。
  实际意图：观察中美互动，根据对自己有利的方向调整立场。
  关键信号：俄罗斯是否在伊朗陷入困境时提供实际帮助，还是仅限口头支持。

authorization_limit: |
  完全自主的权力：
  - 对伊朗的公开声明和外交立场
  - 对伊朗的石油、天然气贸易政策
  - 在联合国安理会对伊朗相关议题的投票

  需要评估但通常有自主决定权：
  - 对伊朗的防卫设备出口（受国际协议约束，但俄罗斯空间有限）
  - 是否派遣军事顾问到伊朗

  灾难风险：
  - 如果俄罗斯过度支持伊朗导致国内反对，Putin 会立即转向「灵活中立」

key_unknowns:
  - "Putin 对伊朗局势的真实评估是什么？他是否认为伊朗能坚持，还是注定失败？"
  - "俄罗斯与伊朗之间是否存在秘密军事合作协议，超出公开的内容？"
  - "Putin 与 Xi 就伊朗问题进行过什么程度的协调？是否存在俄中「共同战略」？"
  - "俄乌战争对 Putin 的伊朗政策有多大的制约？他是否将伊朗视为优先级？"
  - "Putin 是否会在某个时刻背弃伊朗来与美国进行某种妥协？"

watch_for:
  - "俄罗斯驻伊朗大使的活动频率和言论，可能显示俄罗斯对伊朗的重视程度"
  - "俄罗斯官媒对伊朗局势的评价变化，特别是「战斗精神」vs「理性和平」的叙事转变"
  - "俄罗斯是否开始向伊朗运送任何实际装备或提供技术支持的证据"
  - "Putin 与伊朗领导人（Mojtaba）的电话或会晤记录，以及会晤内容的泄露"
  - "俄罗斯官方对「俄伊友好」程度的言论强度变化"
  - "俄罗斯石油价格的走势与俄罗斯对伊朗表态的相关性"
  - "俄罗斯是否试图通过第三国（叙利亚、伊拉克）与伊朗沟通，而避免直接接触"

primary_sources:
  - "Putin 的官方声明和讲话"
  - "俄罗斯外交部的新闻发布会和声明"
  - "俄罗斯官媒（塔斯社、俄罗斯新闻社）对伊朗局势的评价"
  - "国际媒体对俄罗斯政策的分析"
  - "伊朗官媒对俄罗斯援助的报道（如果有的话）"

evidence_quality: "★★☆"
