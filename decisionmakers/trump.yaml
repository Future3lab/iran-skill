name: "Donald Trump"
role: "美国总统"
last_updated: "2026-04-14"

power_base: |
  权力来自共和党基本盘（40-45% 选民）+ 经济民粹主义叙事 + 2024 大选胜利的政治资本。
  失去党派支持或经济恶化将严重削弱其决策权，但执行任期内对外交的掌控相对不受制约。
  国会在任期内对伊朗政策制约有限。

domestic_constraints:
  - 经济民粹主义选民要求「美国优先」，过度军事干预会触发党内孤立主义翼的反对
  - 油价上升对国内通胀敏感，可能限制长期对伊制裁力度
  - 中期选举前（2026）民意支持率下降会削弱对伊军事升级的政治空间
  - 共和党中的利比亚战争反思者（Vance 等）会定期施压要求克制

decision_style: |
  交易心理型（75%）+ 实用主义（20%）+ 意识形态虚张声势（5%）。
  核心驱动力是「赢得足够多可以宣布胜利」，而非地缘战略最优。
  公开威胁是谈判工具，具有高度灵活性。

red_lines:
  - "伊朗导弹直接击中美国领土或驻中东重要军事设施（死伤>50人）→ 必然强制军事升级，无谈判出口 (★★★)"
  - "伊朗关闭霍尔木兹海峡或大规模攻击海湾盟国关键基础设施 → Trump 会考虑有限地面干预 (★★☆)"
  - "美国国内恐怖袭击被指伊朗支持 → 公众压力迫使极端响应 (★★☆)"

known_triggers:
  escalate:
    - "伊朗进行大规模导弹或无人机演习（被解读为准备攻击）→ Trump 会通过推特发起「最后警告」威胁"
    - "如果 Netanyahu 主动升级轰炸力度，Trump 会快速跟风，声称「强大的美国支持以色列」"
    - "伊朗损坏或威胁美国军舰 → 他会公开表示「美国拥有完全压倒性的军事优势，不要试图我们」"
    - "国内政治反对声音减弱（民调支持率 >50%）→ 他倾向延长对伊威胁期，推迟谈判时间"
    - "2026-04-13 已宣布海上封锁，若伊朗试图突破将引发 Trump 个人名誉绑定的军事响应"
  deescalate:
    - "伊朗公开表示愿意「无条件谈判」（不涉及核问题），Trump 会声称「伊朗已经屈服」转向谈判"
    - "沙特或阿联酋发起「共同经济框架」，且伊朗表示参与意愿 → Trump 会将其重新标签为「他的协议」"
    - "国内经济数据恶化或中期选举民调下滑 → 他会寻求「快速胜利」，即使妥协幅度较大"
    - "如果伊朗避免军事挑衅 30 天以上，Trump 会主动声称「伊朗已被击败」并建议谈判"
    - "盟国（尤其是日本、韩国）向 Trump 表示过度对伊对策影响全球经济 → 他会快速调整立场"

known_bluffs:
  - "2025年1月：宣布「对伊朗最后期限72小时」，实际延期 3 次（落差率 100%）"
  - "2025年11月：威胁「如果石油经过伊朗海峡必将没收」，从未执行查船（落差率 80%）"
  - "2026年4月13日海上封锁：宣布「绝对封锁」，但实际允许中国油轮通过（落差率 60%，策略性执法）"

negotiation_style: |
  谈判目标不是「伊朗核计划」，而是「能否签署一个 Trump 能以他名义宣传的协议」。
  让步时机：当国内政治压力（民调、经济、党内反对）足够大时，会快速妥协。
  胜利定义：媒体能否报道「伊朗在美国压力下屈服」，而非协议的实际条款。
  谈判中的虚张声势极多，需要等待最后 48 小时才能判断真实底线。
  对方任何表示「尊重美国强大」的措辞都会被他解读为妥协信号。

current_position: |
  2026-04-14：宣布对伊海上封锁（2026-04-13），同时向伊朗发出「我们可以谈」的暗示。
  表面立场：「彻底击败伊朗威胁」。
  实际意图：寻求 3-6 个月内可以宣布为「胜利」的协议框架。
  对 Witkoff 谈判团队的指示：「找一个能签字的交易，我不在乎条款，只要它看起来像伊朗让步」。

authorization_limit: |
  完全自主决策权：
  - 对伊制裁范围和执行强度（在经济顾问范围内）
  - 军事行动的初始化（需国务卿、国防部长确认，但几乎无实质制约）
  - 公开声明和威胁（无制约）

  需国会配合但能绕过：
  - 对伊大规模轰炸需知会国会，但 Trump 解释为「反恐」可绕过战争权条款

  需要顾问讨论但通常自行决定：
  - 谈判框架设计（Witkoff、Rubio 有影响力但不能否决）

key_unknowns:
  - 他心目中「足够的胜利」的具体阈值是什么？（核协议？制裁更严？伊朗道歉？）
  - 中期选举民调恶化的临界点是多少，他愿意立即转向谈判
  - 如果 Netanyahu 单独对伊朗进行灾难性轰炸，Trump 会立即跟风还是反而快速谈判
  - Witkoff 的房地产商谈判风格能否真正改变 Trump 对「赢」的定义

watch_for:
  - Trump 推特发文频率变化 → 高频率通常表示政治压力增加，谈判出口接近
  - 他对 Mojtaba 的个人攻击程度 → 人身攻击减少通常预示谈判升温
  - 白宫发言人是否开始使用「灵活」「建设性对话」等措辞 → 官方软化信号
  - 他对油价上升的公开评论 → 如果开始怪罪伊朗而非 OPEC，表示寻求转向降温
  - Witkoff 是否频繁往返中东 → 增加频率预示谈判进入实质阶段

primary_sources:
  - Trump 官方推特 / Truth Social 账户（实时决策意图泄露）
  - 白宫每日新闻简报（官方立场软化信号）
  - Trump 在共和党集会上的即兴发言（真实想法泄露概率高）
  - Axios / Politico 对 Trump 幕僚的报道

evidence_quality: "★★★"
