name: "Xi Jinping"
role: "中国国家主席"
last_updated: "2026-04-14"

power_base: |
  权力来自中共中央最高权力 + 军队控制 + 经济决策权。
  权力稳定，短期内不会动摇。
  对伊朗政策的约束来自多个竞争利益，而非权力基础的脆弱。

domestic_constraints:
  - 台海优先：任何伊朗战争都不能让西方集中注意力或资源在台湾
  - 经济增长压力：伊朗战争导致油价飙升会对中国经济构成压力（虽然有利有弊）
  - 与美关系的平衡：中国不能被认为是「伊朗的主要供应国」，否则会激怒美国对华政策
  - 中俄关系：如果中国对伊朗的军援超过俄罗斯，可能激怒普京

decision_style: |
  战略利益型（80%）+ 成本收益分析（15%）+ 文化考量（5%）。
  核心驱动力：维持多极化世界秩序 + 保证能源安全 + 不被伊朗战争绑架。
  对伊朗采取「有限支持」策略，类似俄乌战争中对俄的态度。
  公开立场与实际行动的落差大，用外交语言掩盖实际有限的承诺。

red_lines:
  - "伊朗政权崩溃导致中国在伊朗的数千亿美元投资（一带一路、石油开采合同）化为乌有 → 中国会考虑增加对伊军事支持来阻止这一情景，但通常会选择等待时机而不是立即升级 (★★☆)"
  - "美国威胁对中国进行「能源制裁」或「金融制裁」以换取中国与伊朗脱钩 → 中国会进行内部评估，但不会被简单威胁所动 (★★☆)"
  - "伊朗石油完全被美国封锁导致全球油价超过 150 美元/桶，伤害中国经济 → 中国可能会考虑对美国进行「反制性制裁」或支持伊朗突破美国封锁 (★★☆)"

known_triggers:
  escalate:
    - "伊朗请求中国进行「实质性军事干预」（如提供先进防空系统、战斗机）→ Xi 会评估成本，如果被认为低，可能同意；如果被认为高，会拒绝或延迟"
    - "美国对中国进行「经济威胁」以交换与伊朗脱钩 → Xi 会强硬回应，增加对伊朗的名义支持（言论上的强硬，但实际支持可能有限）"
    - "俄罗斯向中国请求「共同防御伊朗的地缘政治利益」→ Xi 会保持警惕，因为他不想被俄罗斯利用"
    - "中国的伊朗盟友（如伊斯兰共和国国家石油公司）被美国制裁，中国企业因此蒙受损失 → Xi 可能会下令「秘密转移贸易」以绕过美国制裁"
  deescalate:
    - "美国与伊朗达成某种协议，中国被邀请参与或作为见证方 → Xi 会倾向参与，以维持中国的地缘政治影响力"
    - "伊朗局势稳定，中国可以放心地长期开采伊朗石油 → Xi 会下令减少军事支持，转向经济投资"
    - "台湾局势升温，需要中国集中注意力 → Xi 会自动减少对伊朗问题的投入"

known_bluffs:
  - "2026-03-20 中国外交部表示「中国坚定支持伊朗的正当权益」，但实际对伊军事支持有限（落差率 80%）"
  - "中国多次声称「中伊战略伙伴关系」，但在美国压力下，中国对伊朗的投资和贸易可能减少（落差率 60%）"
  - "中国宣布「人道主义援助」给伊朗，但规模和实际到位情况往往被夸大（落差率 70%）"

negotiation_style: |
  追求「不承诺」的谈判方式。中国会声称支持伊朗，但在谈判中从不做出具体承诺。
  中国会建议伊朗与美国进行「建设性对话」，同时暗示中国是伊朗的「幕后支持者」。
  中国会使用「第三方中介」身份（如通过伊拉克、阿曼调停），以避免直接与美国冲突。
  中国对伊朗的条件往往隐含着：「如果你与美国达成协议，我们会增加对你的投资」。

current_position: |
  2026-04-14：中国官方立场是「呼吁所有方面进行和平谈判」。
  公开表述：「伊朗有权维护自身安全，但也应该与国际社会进行建设性对话」。
  实际意图：保持「灵活中立」，在伊朗和美国之间都保持一定的关系。
  关键信号：中国外交部是否在谈判破裂后立即与伊朗接触，以及接触的形式和规模。

authorization_limit: |
  完全自主的权力：
  - 对伊朗的经济和贸易政策（可以绕过制裁）
  - 对中国在伊朗的投资项目的决定（一带一路项目的推进或延迟）
  - 对伊朗的外交立场和言论

  需要评估但通常有自主决定权：
  - 对伊朗的防卫设备和技术的出口（虽然受国际协议约束，但中国有空间）
  - 是否公开宣布支持伊朗或保持中立

  灾难风险：
  - 如果中国被认为「过度支持伊朗」而激怒美国，可能导致中美关系急剧恶化

key_unknowns:
  - "Xi 对伊朗战争的真实评估是什么？他是否认为伊朗能坚持到底，还是认为伊朗最终会被迫妥协？"
  - "中国对伊朗石油的真实需求是多少？这是否足以推动中国进行实质性支持？"
  - "中国是否与伊朗有任何秘密的军事合作协议，还是所有合作都是公开的？"
  - "Xi 对俄罗斯在伊朗问题上的真实态度是什么？中俄是否进行过协调？"
  - "台海局势与伊朗问题的优先级关系是什么？如果台海升温，Xi 会如何调整对伊朗的政策？"

watch_for:
  - "中国驻伊朗大使的活动频率和会议对象，可能显示中国政府对伊朗局势的重视程度"
  - "中国官媒对伊朗的评价，从「兄弟国家」转为「伙伴国家」可能表示关系降温"
  - "中国与伊朗的贸易数据变化，增加表示支持，减少表示与美国进行某种协议"
  - "是否有中国军事顾问或官员访问伊朗，这会显示中国对伊朗军事支持的承诺水平"
  - "Xi 在国际会议上对伊朗问题的言论变化"
  - "中国是否增加对伊朗石油的采购，这可能是对伊朗的隐形支持"

primary_sources:
  - "Xi Jinping 的官方声明和讲话"
  - "中国外交部的新闻发布会和声明"
  - "中国官媒（新华社、人民日报）对伊朗局势的评价"
  - "中国商务部关于对伊贸易和投资的数据"
  - "国际媒体对中国政策的分析（如 Politico、Financial Times）"

evidence_quality: "★★☆"
