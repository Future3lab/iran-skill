name: "Mohammad bin Salman (MBS)"
role: "沙特王储兼国防部长"
last_updated: "2026-04-14"

power_base: |
  权力来自沙特王室内的权力竞争优势 + 国防部长身份 + 对沙特经济和军队的深度控制。
  通过「Vision 2030」经济改革和与美国的军事同盟维持他的权力。
  权力稳定，但依赖于：
    - 石油价格保持在相对高位（国家财政支持）
    - 伊朗被持续削弱或控制（区域平衡）
    - 与美国的同盟关系维持（军事和经济支持）
  失去任何一个基础都会削弱他的权力。

domestic_constraints:
  - 经济改革（Vision 2030）需要稳定的国际环境和能源价格支撑
  - 伊朗战争导致的油价波动可能影响沙特的经济计划
  - 沙特国内的宗教保守派可能对伊朗战争有复杂的看法
  - 沙特王室内的权力竞争：如果伊朗战争导致沙特利益受损，其他王子可能挑战 MBS 的决策
  - 与美国的关系是 MBS 权力的基础，任何与美国的分歧都会削弱他

decision_style: |
  战略利益型（70%）+ 成本收益分析（25%）+ 地缘政治考量（5%）。
  核心驱动力：确保伊朗被削弱但不至于失控 + Vision 2030 的经济增长 + 维持与美国的同盟。
  MBS 倾向于「持久压制伊朗」而非「击败伊朗」（完全击败可能导致地区失控）。
  他会权衡两个目标：
    1. 希望伊朗被持久削弱（战略利益）
    2. 不希望地区完全失控（经济成本）

red_lines:
  - "伊朗导弹或代理势力对沙特石油设施（Aramco）进行成功的重大攻击 → MBS 会立即寻求美国军事支持，可能加强与美国的防卫同盟 (★★★)"
  - "伊朗导弹打击沙特城市且伤亡 >100 人 → MBS 会面临国内压力要求强硬报复，但通常会寻求美国的军事支持而非单独行动 (★★☆)"
  - "伊朗声称「沙特是美国的奴才」并号召沙特民众推翻 MBS → MBS 会加强国内安全部队控制，但不会改变对伊朗的强硬立场 (★★☆)"
  - "美国与伊朗达成协议而不咨询沙特 → MBS 会感到被背弃，可能重新考虑与中国的关系（2016 年沙特与中国的关系升温就是这个原因）(★★☆)"

known_triggers:
  escalate:
    - "伊朗对沙特盟国（阿联酋、阿曼）进行军事挑衅 → MBS 会建议沙特与美国进行更紧密的军事合作来「应对伊朗威胁」"
    - "沙特官媒评估伊朗「对沙特和地区稳定的威胁」增加 → MBS 可能会建议对伊朗进行「防卫性军事准备」"
    - "沙特的经济增长目标（Vision 2030）遭遇油价下跌威胁，MBS 将责任归咎于伊朗 → MBS 可能会建议进行「更强硬的政策」来维持油价"
    - "美国（特别是 Netanyahu）向 MBS 表示「需要沙特的军事支持来对付伊朗」→ MBS 可能会同意进行某种军事合作"
  deescalate:
    - "伊朗停止对沙特及其盟国的威胁，表现出「建设性」态度 → MBS 可能会向美国和伊朗表示「沙特愿意考虑更稳定的区域关系」"
    - "沙特石油销售稳定，国家收入充足，经济增长按计划进行 → MBS 可能会减少对伊朗的强硬立场，转向「区域和平」论调"
    - "美国与伊朗达成协议且包含「沙特的安全保障」条款 → MBS 会快速接受这个协议，声称这是沙特外交的胜利"
    - "中国向 MBS 表示「我们支持沙特的经济改革，并愿意投资 Vision 2030」→ MBS 可能会开始采取「平衡」政策，即既与美国同盟又与中国友好"
    - "沙特与伊朗进行秘密谈判，MBS 评估「某种和解对沙特经济有利」→ MBS 可能会公开表示「沙特支持地区和平」"

known_bluffs:
  - "2019 年沙特油田遭袭后，MBS 声称「沙特已准备好报复伊朗」，但最终寻求美国军事支持而非独立行动（落差率 80%）"
  - "多次声称「沙特与伊朗之间无谈判空间」，但实际上沙特与伊朗的秘密沟通从未完全停止（落差率 70%）"
  - "2020-2025 年间，MBS 多次表示「伊朗对沙特的威胁」处于最高水平，但实际威胁程度可能被夸大（落差率 60%）"

negotiation_style: |
  MBS 通常不直接与伊朗谈判，而是通过美国、中国或阿曼等中介。
  MBS 的谈判目标：确保伊朗不会对沙特构成存在威胁，同时不完全击败伊朗（以避免地区权力真空）。
  他倾向于要求「国际监督」（如中美参与）来确保任何协议的稳定性。
  MBS 对长期协议的兴趣有限，他更倾向于「可调整的安排」，允许沙特根据伊朗行为进行响应。

current_position: |
  2026-04-14：MBS 正在评估 Trump 宣布的海上封锁（2026-04-13）对沙特利益的影响。
  公开立场：「沙特支持维持地区稳定，但伊朗必须尊重国际秩序」。
  实际意图：维持与美国的同盟，同时保持与伊朗的秘密沟通渠道（伊拉克、阿曼）。
  关键信号：MBS 是否公开表示沙特对美国海上封锁的支持，或是保持「中立」。
  对伊朗谈判的态度：表面反对，但会接受美国主导的谈判如果 MBS 认为对沙特有利。

authorization_limit: |
  完全自主的权力：
  - 沙特的国防政策和军队部署
  - 与美国的军事同盟决定
  - 对伊朗的经济和贸易政策（虽然这通常与国家政策一致）

  需要国王咨询但通常能获得的权力：
  - 对伊朗的大规模军事行动（需要国王最终批准）
  - 与伊朗进行和平谈判（需要国王同意）

  需要国王书面批准的权力：
  - 任何战略性的重大政策转变（如改善对伊朗的关系）

  灾难风险：
  - 如果伊朗战争导致沙特经济严重受损，国王和王室其他成员可能对 MBS 的决策提出质疑

key_unknowns:
  - "MBS 与伊朗的秘密沟通渠道有多活跃？沙特是否通过伊拉克或阿曼与伊朗进行非正式接触？"
  - "MBS 对伊朗长期威胁的真实评估是什么？他是否认为伊朗无法对沙特构成根本威胁，还是确实存在重大担忧？"
  - "MBS 与中国关系的升温对他对伊朗政策的影响程度有多大？中国是否建议 MBS 采取「平衡」政策？"
  - "Vision 2030 经济增长目标对 MBS 的伊朗政策有多大的制约？如果经济增长停滞，他会改变立场吗？"
  - "MBS 与以色列的秘密防卫合作有多深？这是否影响了他对伊朗的政策立场？"

watch_for:
  - "沙特官媒对伊朗的评价强度变化：强烈负面表示 MBS 在为强硬政策造势"
  - "MBS 与伊朗官员的任何公开或秘密会晤的报道"
  - "沙特是否开始增加从伊朗的进口或与伊朗的贸易，这可能表示关系改善"
  - "MBS 的公开发言中是否开始出现「区域和平」「对话」等措辞，而减少「伊朗威胁」的语言"
  - "沙特军队的活动水平和对伊朗边境的防卫准备程度"
  - "MBS 与 Trump、Netanyahu 的会晤频率和内容，以及会晤后对伊朗政策的变化"
  - "沙特石油价格和出口数据，以及 MBS 是否将经济困难与伊朗相关联"

primary_sources:
  - "MBS 的官方声明和讲话"
  - "沙特国防部和官媒的声明"
  - "沙特官媒（沙特通讯社）对伊朗局势的评价"
  - "国际媒体对 MBS 和沙特政策的分析"
  - "沙特与伊朗之间的秘密外交的泄露信息（通过伊拉克或阿曼渠道）"
  - "沙特经济和 Vision 2030 的进展报告"

evidence_quality: "★★☆"
