name: "Benjamin Netanyahu"
role: "以色列总理"
last_updated: "2026-04-14"

power_base: |
  权力来自以色列总理身份 + 联合政府中的党派支持 + 以色列安全机构的信任。
  权力相对稳定，但受国内政治极其约束：以色列大选时间表和联合政府构成会直接影响他的政策决定。
  与伊朗的冲突维持他的「强硬领导人」形象，这对他维持国内支持至关重要。
  失去这个「对伊朗强硬」的形象会立即导致国内政治反对。

domestic_constraints:
  - 联合政府的脆弱性：右翼政党要求「彻底打败伊朗」，温和派要求「有限作战」
  - 以色列大选时间表（下一次预计 2026 年底或 2027 年初）：Netanyahu 需要维持「强硬」形象以在大选中获胜
  - 国内反对派要求「立即停火」以减少以色列士兵伤亡和经济成本
  - 美国对以色列的支持条件：Trump 关注「战争胜利」，Vance 关注「成本控制」
  - 国际舆论压力：以色列的军事行动经常面临国际批评，这对国内士气有影响

decision_style: |
  生存政治型（60%）+ 军事实用主义（30%）+ 意识形态（10%）。
  核心驱动力：维持「强硬领导」形象以赢得大选 + 确保以色列的长期安全 + 对美国的依赖。
  对伊朗采取强硬立场是他维持国内权力的必要条件。
  任何「软弱」或「谈判」的表现都会被对手利用来攻击他。

red_lines:
  - "伊朗导弹直接击中以色列城市，造成重大伤亡 → Netanyahu 会被迫进行大规模报复轰炸，无论国内或国际压力有多大 (★★★)"
  - "以色列军队在伊朗领土上遭遇重大伤亡（>100 人在单次行动中）→ Netanyahu 的国内政治地位会受到严重威胁，他可能被迫宣布「胜利」并停止深入行动 (★★☆)"
  - "美国明确告诉 Netanyahu「停止对伊朗的轰炸」→ Netanyahu 会需要在美国压力和国内右翼压力之间找到平衡，最终会选择向美国妥协（因为以色列对美援助的依赖）(★★★)"
  - "以色列大选接近且民调显示 Netanyahu 支持率下降 → Netanyahu 会倾向于对伊朗进行更激进的军事行动来「重新获得」支持 (★★☆)"

known_triggers:
  escalate:
    - "伊朗发出任何被认为是「对以色列的威胁」的言论或军事行动 → Netanyahu 会对国内声称「伊朗威胁到以色列生存」，并建议对伊朗进行新的轰炸"
    - "以色列国内右翼政党声称「Netanyahu 太软弱」→ Netanyahu 会通过对伊朗的军事行动来证明「他是强硬的」"
    - "Trump 公开支持 Netanyahu 对伊朗的强硬行动 → Netanyahu 会被鼓励进行更激进的军事升级"
    - "伊朗导弹或无人机对以色列军事设施进行攻击 → Netanyahu 会立即要求进行对伊朗的大规模报复"
    - "以色列大选民调显示右翼党派可能超过 Netanyahu → Netanyahu 会通过对伊朗的强硬行动来争夺右翼选票"
  deescalate:
    - "美国或 Trump 公开表示「对伊朗的过度军事行动不符合美国利益」→ Netanyahu 会迫不得已地考虑降温，因为以色列对美援助的依赖"
    - "伊朗公开表示「愿意与以色列通过中介进行谈判」→ Netanyahu 可能会要求美国进行调停，声称「他在给伊朗改过的机会」"
    - "以色列大选距离还有 6 个月以上，民调显示 Netanyahu 支持率稳定 → Netanyahu 可能会考虑进行「有限停火」来降低国内伤亡"
    - "国际舆论对以色列的压力激增（如联合国谴责），并且影响以色列的国际形象 → Netanyahu 可能会同意进行有限的停火或谈判"

known_bluffs:
  - "2026-03-15 Netanyahu 宣布「以色列正在进行最大规模的对伊军事行动」，但实际范围有限（落差率 60%）"
  - "多次声称「如果伊朗获得核武器，以色列将无法存在」，但对伊朗核计划的实际评估可能没有这么极端（落差率 50%）"
  - "2026-04-08 停火期间声称「以色列已准备好应对伊朗的任何挑衅」，但防守能力的实际评估未知（落差率 70%）"

negotiation_style: |
  Netanyahu 通常不进行直接谈判，而是通过美国作为中介。
  他的谈判策略：通过军事压力迫使对方接受自己的条件，而不是在谈判桌上妥协。
  当被迫进行谈判时，Netanyahu 会要求「绝对的安全保障」，这通常意味着伊朗的完全非武装化或权力转移。
  他倾向于将任何谈判视为「暂时的」而非「长期的」，以保留随时升级的选项。

current_position: |
  2026-04-14：Netanyahu 在评估 Trump 宣布的海上封锁（2026-04-13）是否足以威慑伊朗。
  公开立场：「以色列已准备好应对伊朗的任何威胁，我们的防守是固若金汤的」。
  实际意图：维持「强硬」的形象，同时在适当的时候宣布「胜利」以为大选造势。
  对 Trump 个人关系的依赖：Netanyahu 与 Trump 建立了个人关系，他会频繁参考「Trump 的立场」来支持他的军事决定。
  对谈判的态度：表面上反对「与伊朗谈判」，但会接受「美国主导的谈判」如果 Trump 坚持的话。

authorization_limit: |
  完全自主的权力：
  - 以色列空军对伊朗目标的轰炸（但需要美国的隐含支持，即不反对）
  - 以色列国内的安全措施和防卫准备

  需要美国支持但通常能获得的权力：
  - 对伊朗的大规模轰炸行动（需要美国的事先或事后认可）
  - 对伊朗的网络战争和隐蔽行动

  需要国内政治共识的权力：
  - 任何涉及停火或谈判的决定（需要联合政府和国会的支持）

  灾难风险：
  - 如果以色列的军事行动导致大规模以色列士兵伤亡，Netanyahu 的国内政治地位会严重受损

key_unknowns:
  - "Netanyahu 对伊朗军事能力的真实评估是什么？他是否认为伊朗能坚持，还是注定失败？"
  - "Netanyahu 与 Trump 的私下沟通中，Trump 对伊朗问题的真实立场是什么？"
  - "以色列大选时间表对 Netanyahu 对伊朗政策的影响程度有多大？他会多大程度地为了选票而升级或降温？"
  - "以色列与美国关于伊朗政策的内部分歧有多深？Netanyahu 是否愿意违反美国意愿进行某些军事行动？"
  - "Israel's 对伊朗长期军事威胁的真实担忧程度是什么？这是基于情报还是基于国内政治？"

watch_for:
  - "Netanyahu 公开发言中对「伊朗威胁」的评价强度变化：强烈评价表示他在为升级造势"
  - "Netanyahu 与 Trump 的会晤频率和内容，以及会晤后 Netanyahu 的政策变化"
  - "以色列大选民调的变化，特别是右翼党派的民调数据，可能预示 Netanyahu 的军事政策方向"
  - "以色列空军和防卫部队的活动水平和公开演习，可能显示以色列的准备水平"
  - "Netanyahu 是否开始在媒体上使用「停火」或「谈判」等措辞，这可能预示他在考虑降温"
  - "以色列国内对战争的支持程度的民调变化，可能影响 Netanyahu 的政策决定"
  - "伤亡数据（以色列士兵死亡）的公布，这可能激起国内反对，促使 Netanyahu 改变政策"

primary_sources:
  - "Netanyahu 的官方声明和讲话"
  - "以色列国防部和军队的公开声明"
  - "以色列官媒对伊朗局势的评价"
  - "国际媒体对 Netanyahu 政策的分析（如 Politico、The Guardian）"
  - "以色列民意民调和政治分析"
  - "美国官员对 Netanyahu 的评价和私下沟通的泄露"

evidence_quality: "★★★"
