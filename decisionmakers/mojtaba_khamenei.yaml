name: "Mojtaba Khamenei"
role: "伊朗最高领导人（继任者）"
last_updated: "2026-04-14"

power_base: |
  权力来自：IRGC（伊斯兰革命卫队）的集体拱卫，而非宗教合法性（无法继承父亲的「毛拉」身份）。
  与父亲不同，他的权力完全基于军事机构的支持，失去 IRGC 支持 = 权力瞬间消失。
  当前（2026-04-14）：上任 35 天，权力基础仍在巩固阶段，需要向 IRGC 证明自己的「强硬」。
  潜在风险：IRGC 内部可能存在对他的实际权力大小的分歧，某些派系可能质疑他的继任合法性。

domestic_constraints:
  - IRGC 内部可能分裂：主战派（支持继续与美对抗）vs 务实派（寻求谈判出口以减轻经济压力）
  - 经济危机极其严重，但他需要维持强硬姿态来获得 IRGC 的信任
  - 国内民众对战争疲劳，但他无法表现出「软弱」，否则会被质疑权力合法性
  - 伊朗宗教学者（最高评议会）可能对他的决定进行制约或挑战，尤其如果他做出妥协
  - 他作为继任者的身份本身就脆弱，任何重大政策失败会立即引发权力挑战

decision_style: |
  生存型（70%）+ 强硬意识形态（20%）+ 不确定性导向（10%）。
  核心驱动力：证明自己比父亲（Khamenei）更强硬和更能控制局面，以巩固新近获得的权力。
  短期妥协空间小，因为任何妥协都会被解读为「年轻，无法应对大国竞争」。
  决策过程缺乏经验，更容易依赖 IRGC 的建议，而 IRGC 本身可能存在分歧。
  最危险的是他可能为了证明强硬而采取过度军事行动。

red_lines:
  - "美国或以色列对伊朗领导层进行定点清除（如暗杀 Mojtaba 或 IRGC 高级将领）→ 必然导致大规模报复，无任何谈判出口，伊朗不论代价多大都会反击 (★★★)"
  - "美国/以色列进行大规模空袭摧毁伊朗核设施或军事指挥中心 → Mojtaba 将被迫立即下令全面导弹和无人机攻击以维持强硬形象 (★★☆)"
  - "伊朗内部出现针对 Mojtaba 权力的公开挑战或 IRGC 派系明显不支持他的决定 → 他会倾向采取过度强硬行动来「重新夺回» 权力感 (★★☆)"
  - "美国公开声称「目标是推翻伊朗政权而非仅限制核计划」→ Mojtaba 会认为妥协无用，选择全面对抗 (★★☆)"

known_triggers:
  escalate:
    - "父亲 Khamenei 去世后的第一次「国际挑衅」（美国或以色列主动升级）→ Mojtaba 需要立即强硬回应来证明他有能力维持伊朗的「尊严和力量」"
    - "IRGC 内部有派系声称「Mojtaba 太年轻，应该由 IRGC 司令直接领导」→ Mojtaba 会采取极端行动来压制这种声音，哪怕是过度军事升级"
    - "美国宣布新的对伊制裁或扩大范围 → Mojtaba 有强烈动力做出「象征性军事回应」来向国内展示「他在反击」"
    - "如果国内经济数据恶化（失业率上升、里亚尔贬值加速），他倾向于对外升级以转移国内不满"
    - "任何被解读为「外国支持伊朗政权变化」的信号 → Mojtaba 会立即拘捕相关人员、加强安全部队"
  deescalate:
    - "中国和俄罗斯同时向伊朗发出「我们支持和平谈判」的明确信号 + 承诺继续经济支持 → Mojtaba 可能开始考虑谈判出口"
    - "美国（特别是 Trump 或 Vance）公开表示「尊重伊朗主权」和「愿意听取伊朗的条件」→ Mojtaba 可以面子上同意谈判"
    - "IRGC 最高司令向 Mojtaba 私下表示「长期军事对抗对伊朗经济构成致命威胁，应该考虑出口」→ 如果来自信任的军事顾问，Mojtaba 会倾听"
    - "国内舆论（包括互联网）开始出现对战争的厌倦情绪，民意民调显示 >60% 支持谈判 → Mojtaba 可能利用民意作为借口推进谈判，同时声称「是为了人民」"
    - "如果谈判包含「逐步解除制裁」条款且中国、俄罗斯立即承诺新投资，Mojtaba 会快速同意"

known_bluffs:
  - "2026-03-15 宣布「伊朗已准备好对任何美国侵略进行全面报复」，但缺乏具体军事准备（推断落差率 70%）"
  - "2026-04-08 停火协议期间仍称「伊朗不会被制裁吓倒」，同时悄悄与谈判团队接触（落差率 60%）"
  - 多次使用「伊朗人民团结一致」的修辞，实际上国内对他的支持程度未知（落差率 80%，推断成分高）"

negotiation_style: |
  极其谨慎和缓慢，因为他需要确保任何协议都能被解读为「伊朗的胜利」。
  他不会像 Araghchi（外长）一样立即响应谈判提议，而是要求详细的书面提案。
  对于任何妥协，他需要能够向国内和 IRGC 解释「为什么这是伊朗的胜利而非失败」。
  他倾向于要求第三方（中国、俄罗斯、伊拉克）参与见证，以增加协议的合法性。
  最关键的是：他会要求美国首先做出单边让步（解除某些制裁）来证明「美国真的想谈」。

current_position: |
  2026-04-14：在 2026-04-08 临时停火框架内，Mojtaba 采取「观察立场」。
  对 Trump 宣布的 2026-04-13 海上封锁的立场未知（这是关键信号）。
  公开立场：「伊朗不会屈服，但愿意参与任何尊重伊朗主权的谈判」（这是标准保险用语）。
  实际意图：正在评估美国内部（Rubio vs Witkoff）的权力争夺，以判断美国的真实底线。
  关键待定因素：他是否相信美国真的有谈判意愿，还是认为这只是争取时间的策略。

authorization_limit: |
  完全自主的权力：
  - 对 IRGC 的指挥权（但需要得到 IRGC 高层的确认）
  - 导弹和无人机发射的终极决策权（理论上）
  - 国内安全部队的控制

  需要确认但通常能获得的权力：
  - 任何参与国际谈判的承诺（需要 IRGC 司令和宗教学者评议会的同意）
  - 解除内部动员令或调整军事准备水平

  灾难风险：
  - 如果他采取的行动被 IRGC 派系认为「危害伊朗国家利益」，可能面临权力挑战
  - 任何大规模军事失败会立即被用来质疑他的领导能力

key_unknowns:
  - "他与 IRGC 最高司令的实际权力分配是什么？谁才是真正的国家最高决策者？"
  - "他是否真的有足够的政治资本支持一个妥协协议，还是在 IRGC 内部处于被监督状态？"
  - "国内宗教学者对他的支持程度有多高？如果他做出妥协，是否会遭到宗教权威的反对？"
  - "他对经济危机的严重程度有多深刻的认识？是否准备为了经济救济而做出核政策妥协？"
  - "他对军事力量的实际评估是什么？是否真的相信伊朗能够打败美国 / 以色列，还是知道这是不可能？"
  - "他是否会因为继任者身份的脆弱性而过度报复，冒着激发美国大规模军事响应的风险？"
  - "中国和俄罗斯在他心目中的作用是什么？他是否信任他们会提供军事支持，还是认为他们只是为了经济利益？"

watch_for:
  - "IRGC 内部是否出现对 Mojtaba 的公开或半公开的质疑，这是他权力不稳的信号"
  - "他对美国新宣布的海上封锁（2026-04-13）的官方回应方式和内容，将直接反映他的强硬程度"
  - "任何关于他与 IRGC 最高司令、宗教学者评议会的「私密会议」的泄露信息"
  - "他的公开讲话中是否开始出现「经济困难」和「人民苦难」的主题，这可能预示他在考虑妥协"
  - "国内安全部队（Basij 民兵、警察）的动员水平，高动员通常预示他在准备应对国内或外部威胁"
  - "伊朗官媒对美国、以色列、沙特的言论调性变化：软化可能预示谈判前奏"
  - "他是否与中国、俄罗斯大使频繁会晤，以及会晤内容的泄露信息"
  - "每次他的公开声明都应被视为「稀缺的一手数据」，用于校准对他决策逻辑的理解"

primary_sources:
  - "Mojtaba 本人的正式讲话和声明（伊朗电视台、官方网站）"
  - "IRGC 最高司令和主要将领的公开言论，尤其关于「最高领导人」地位的评价"
  - "伊朗官方媒体（伊斯兰共和国通讯社 IRNA、伊朗电视一台）对他的新闻报道"
  - "伊朗波斯语 Telegram 渠道和社交媒体上的非官方评论和分析"
  - "中国、俄罗斯官方媒体对 Mojtaba 的评价（反映两国的官方态度）"
  - "间接信息：国内宗教学者对政权的支持言论、军事部队的动员状态"

evidence_quality: "★★☆"
