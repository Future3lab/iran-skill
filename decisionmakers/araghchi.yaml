name: "Abbas Araghchi"
role: "伊朗外长（谈判代表）"
last_updated: "2026-04-14"

power_base: |
  权力来自 Mojtaba 的任命和信任 + 外交专业背景。但权力极其有限。
  他本质上是执行者而非决策者，必须向上请示才能在谈判中做出任何实质性承诺。
  失去 Mojtaba 的信任会立即失去所有权力。当前（2026-04-14）Araghchi 在伊斯兰堡谈判中被评价为「无授权签字」，表明他的权力已经被 Mojtaba 严格限制。

domestic_constraints:
  - 无法独立做出任何涉及核政策的决定，必须向 Mojtaba 请示
  - IRGC 可能会监督他的言论，确保他不会超越权限进行「软弱」的承诺
  - 伊朗国内政治精英可能会监督他，防止他在谈判中被「美帝欺骗」
  - 他如果被认为「过于接近美国」，可能面临国内政治反弹

decision_style: |
  外交家型（80%）+ 官僚型（15%）+ 受约束型（5%）。
  核心驱动力：执行 Mojtaba 的指令，同时在细节上保护伊朗的外交灵活性。
  他会尽可能多地听取对方的建议，但最终所有实质决定都需要回去请示。
  倾向于使用模糊的外交语言来维持谈判的开放性。

red_lines:
  - "在谈判桌上承诺任何 Mojtaba 未预先批准的条款 → 将被立即撤职，可能面临质疑忠诚度的后果 (★★★)"
  - "被美国官员公开称为「谈判中主张妥协的鸽派」→ Araghchi 会立即发表强硬声明来纠正这个印象 (★★☆)"

known_triggers:
  escalate:
    - "美国代表在谈判中表现出「傲慢或不尊重」→ Araghchi 会作为文化上的防御者立即反驳，可能中止会议"
    - "谈判对手（Witkoff、Vance）要求伊朗立即做出新的承诺而不给予对应的美国让步 → Araghchi 会说「我需要回去请示」，然后几天都不回应"
    - "美国媒体报道说 Araghchi 在谈判中表现软弱 → Araghchi 会通过伊朗媒体发表强硬言论以纠正这个印象"
  deescalate:
    - "美国代表主动承诺解除某项制裁或提供经济援助 → Araghchi 会立即向上汇报，可能导致谈判加速"
    - "对方承诺尊重伊朗主权或使用外交敬语 → Araghchi 会响应以外交礼仪，创造继续谈判的条件"
    - "中国或俄罗斯大使向 Araghchi 暗示「我们支持谈判」→ Araghchi 倾向相信这会给伊朗更多的杠杆力"

known_bluffs:
  - "2026-04-08 停火期间声称「伊朗已准备好进行技术层面的讨论」，但实际上每个「技术问题」都需要向 Mojtaba 请示（落差率 70%）"
  - "2026-04-12 伊斯兰堡谈判中提出「六点建议」，但 Vance 评价这些建议「他没有权力承诺」（落差率 100%）"

negotiation_style: |
  极其谨慎，因为他知道自己缺乏权力。
  每个美国提议都会被他说「这很有建设性，我需要回去与我的领导人讨论」。
  他倾向于进行「程序性谈判」（讨论如何谈判、谈判的框架）而避免「实质性谈判」（实际的条款）。
  他会频繁强调伊朗的「红线」和「原则」，以为自己缺乏权力的限制找到合理解释。
  对美国的任何提议都会首先做出一个「原则性反对」，然后说「但让我看看是否有妥协空间」。
  他倾向于要求任何协议都要包含「最高领导人的批准」，以此保护自己不会被指责「超权」。

current_position: |
  2026-04-12 伊斯兰堡谈判：Araghchi 提出六点建议，但 Vance 评价「他们没有授权签字」。
  2026-04-14：Araghchi 正在等待 Mojtaba 对谈判破裂的指示，是否应该继续谈判或采取强硬立场。
  公开立场：「伊朗愿意谈判，但美国必须首先做出让步」（责任转向对方）。
  实际意图：等待 Mojtaba 的明确指示，然后根据指示行动。
  与美方沟通：通过非正式渠道（秘密会议、第三方中介）与 Witkoff 保持接触，同时向 Mojtaba 报告。

authorization_limit: |
  极其有限的权力：
  - 可以在谈判中提出建议和反建议（但都需要能追溯到 Mojtaba 的指示）
  - 可以接受美国提议并承诺「向上汇报」
  - 可以拒绝任何美国提议（但如果被认为是「软弱」拒绝，可能面临质疑）

  无权做的事：
  - 承诺任何关于伊朗核政策、导弹计划、IRGC 权力的改变
  - 同意任何制裁解除时间表（必须 Mojtaba 批准）
  - 与美国签署任何协议（需要 Mojtaba 和最高评议会批准）

  灾难风险：
  - 如果他在谈判中超越权限，会被撤职并面临对忠诚度的质疑

key_unknowns:
  - "Mojtaba 究竟给了他多少自由度？是完全由 Mojtaba 逐个指示，还是有一个大框架允许他在框架内灵活？"
  - "他与 IRGC 高层的关系如何？是否受到 IRGC 的直接监督？"
  - "他对 Mojtaba 的可信度评估是什么？是否认为 Mojtaba 有能力做出明智决定？"
  - "他是否有权做出小的妥协（如解释条款、技术调整），还是连小事都需要请示？"

watch_for:
  - "Araghchi 在谈判中的回应速度：快速回应表示已获得权限，延迟表示正在请示"
  - "他的言论中关于 Mojtaba 和 IRGC 的「尊重程度」：过度尊重可能表示他的权力受到严格限制"
  - "他是否与美国官员进行非正式接触（咖啡会面、走廊谈话），这可能表示他在试图了解美国的真实立场"
  - "他公开和私下立场的一致性：如果差异大，表示他在对不同听众说不同的话，反映他缺乏稳定的权力基础"
  - "是否有任何迹象表明 Mojtaba 对他的信任下降（如被排除在某些决策之外、媒体对他的负面评价增加）"

primary_sources:
  - "Araghchi 的官方声明和新闻发布会"
  - "伊朗外交部的官方声明"
  - "与他的谈判的参与者的描述（如 Vance、Witkoff 对伊朗谈判团队的评价）"
  - "国际媒体对他的采访和评论"
  - "伊朗官媒对他的评价（高度尊重或批评都能反映他的权力状态）"

evidence_quality: "★★☆"
