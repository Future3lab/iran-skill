name: "JD Vance"
role: "美国副总统"
last_updated: "2026-04-14"

power_base: |
  权力来自副总统身份 + Trump 对他的倚重（国内政治合伙人）+ 共和党孤立主义翼的支持。
  他代表党内对海外军事干预的持续警惕，这是他相对于 Rubio 等鹰派的政治基础。
  失去 Trump 信任会严重削弱他的党派影响力，但当前他是 Trump 政策的重要制衡力量。

domestic_constraints:
  - 共和党孤立主义传统制约他必须定期表示「不希望美国被伊朗战争绑架」
  - 党内鹰派（Rubio）持续施压要求强硬，他需要平衡这种压力
  - 国内民意对中东战争疲劳，任何大规模升级都会触发他的反对
  - 他作为 2028 年潜在总统候选人，需要维持「理智的鹰派」形象

decision_style: |
  孤立主义倾向（60%）+ 实用理性主义（35%）+ 道德关怀（5%）。
  核心驱动力：美国不应被地区冲突绑架，伊朗政策应有明确终点。
  他对伊朗采取强硬立场（IRGC 制裁、导弹防御），但反对无限升级。
  最近的伊斯兰堡谈判破裂（2026-04-12）由他主导，他评价伊朗谈判团队「没有授权签字」，暴露出伊朗内部制约。

red_lines:
  - "Trump 宣布对伊朗大规模地面军事干预（类似伊拉克 2003）→ Vance 会公开反对，可能导致副总统与总统的公开分裂 (★★★)"
  - "美国卷入伊朗战争超过 6 个月且无明确出口 → Vance 倾向建议立即协议或撤退 (★★☆)"
  - "IRGC 成功袭击美国大陆或造成重大伤亡 → Vance 会支持 Trump 的强硬响应，但同时推进「快速解决」 (★★☆)"

known_triggers:
  escalate:
    - "伊朗进行大规模军事演习或导弹试射 → Vance 会发表「伊朗在测试美国决心」的谈话，暗示需要强硬回应"
    - "Mojtaba 发表极端反美声明 → Vance 作为「理性的鹰派」会利用此来证明「伊朗无和平意愿」"
    - "国内民意支持对伊强硬（民调 >60%）→ Vance 会临时倾向支持 Trump 的升级行动"
    - "Rubio 在内阁会议上施压要求更强硬立场 → Vance 会提出「替代方案」但可能被少数"
  deescalate:
    - "伊朗公开表示「愿意与美国和平解决分歧」→ Vance 会立即跟进，声称「看，伊朗理性了」"
    - "中国或俄罗斯表示愿意调停 → Vance 视其为谈判机会，建议 Trump 参与多边框架"
    - "国内经济数据恶化或中期选举民调下滑 → Vance 倾向建议「暂时停止军事升级，专注国内」"
    - "若伊朗避免军事升级 30 天 + 表示「有条件谈判」→ Vance 会建议 Trump 主动提出「谈判框架」"
    - "如果继续对伊军事行动会导致油价超过 150 美元 / 桶 → Vance 会强力建议转向谈判"

known_bluffs:
  - "2026-03-21 表示「如果伊朗不改变态度，美国别无选择」，但实际上在推动伊斯兰堡谈判（落差率 60%）"
  - "2026-04-05 发言称「伊朗走上不可逆转的对抗之路」，随后立即任命自己主导和平谈判（落差率 70%）"
  - 多次表示「美国军队不会参与中东地面战争」，但为海军行动预留了充分空间（落差率 50%）"

negotiation_style: |
  目标：为美国谈判出一个有明确「终点」的协议，避免无限对伊纠缠。
  让步时机：中期，不会在谈判初期就妥协，但一旦确定伊朗有谈判意愿，会快速推进。
  他强调「相互尊重」和「主权」在谈判中的重要性，这与特朗普的「美国压倒性优势」论调不同。
  谈判中常见的说法：「我们给伊朗机会改正错误，他们要抓住」。
  与 Witkoff 的区别：Witkoff 追求快速成交，Vance 追求深度协议且有长期稳定性。

current_position: |
  2026-04-12 主导伊斯兰堡谈判并公开评价伊朗谈判团队「没有授权签字」。
  2026-04-14：正在评估 Trump 宣布的海上封锁是否过度，倾向建议「给谈判更多时间」。
  公开立场：「美国已表现足够强硬，现在球在伊朗一边」。
  实际意图：防止 Trump 被 Rubio 说服进行大规模军事升级。
  对伊核政策：支持「严格限制但不拆除」，认为完全拆除反而会激化伊朗。

authorization_limit: |
  影响力而非决定权：
  - 作为副总统，对 Trump 有咨询影响但无否决权
  - 内阁会议上可以发表立场，但若 Trump 不同意，无法阻止

  实际权力：
  - 主导对伊谈判团队（2026-04-12 伊斯兰堡谈判）
  - 国务卿和国防部长会认真听取他的建议（相对于 Witkoff，他有更多官僚权力）
  - 对情报社区有影响力（可以请求 CIA / DIA 提供有利的评估）

  受限于：
  - Trump 的最终决定，如果 Trump 坚持对伊强硬，Vance 无法阻止
  - 党内鹰派（Rubio、众议院特朗普盟友）的施压

key_unknowns:
  - 他与 Trump 的私下对话中如何论证「伊朗无谈判意愿」这个断定
  - 他对 Mojtaba 相比 Khamenei 会有什么不同的评价
  - 如果 Trump 坚持升级，他会是否公开反对或私下退缩
  - 他对中国在伊朗问题上的角色如何评价，是否认为中国支持伊朗

watch_for:
  - Vance 公开发言中「伊朗无谈判意愿」的论述频率变化 → 增加表示坚持强硬，减少表示考虑谈判
  - 他是否开始在媒体上为「谈判机制」辩护 → 明确的软化信号
  - 与 Witkoff 的联合发声 → 表示美方内部在协调谈判策略
  - 他对「长期对伊冲突成本」的评估在发言中出现频率 → 高频率表示正在考虑政策转向
  - 是否停止对 Rubio 「鹰派倾向」的批评 → 可能表示内部对伊朗政策达成共识

primary_sources:
  - Vance 在白宫会议、演讲和媒体采访中的声明
  - Politico / Axios 对白宫内部伊朗政策分歧的报道
  - Vance 个人推特和通讯稿
  - 与国务卿 Rubio 和国防部长的公开互动

evidence_quality: "★★★"
