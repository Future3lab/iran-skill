name: "IRGC Highest Command (Islamic Revolutionary Guard Corps Command)"
role: "伊朗军事最高权力（集体决策体）"
last_updated: "2026-04-14"

power_base: |
  权力来自对伊朗武装力量的直接控制 + 伊朗国家经济的深度渗透（IRGC 控制许多重要企业和产业）。
  Khamenei 去世后（2026-02-28），IRGC 权力相对上升：Mojtaba 需要 IRGC 的支持来维持权力。
  权力结构变化：IRGC 最高司令现在比以往更接近国家最高权力的中心。
  失去对武装力量的控制 = 权力瞬间崩溃，但 IRGC 内部分化可能导致权力不清（谁能真正代表 IRGC？）。
  注意：这不是个人决策者，而是一个集体决策体，内部可能存在主张不同的派系。

domestic_constraints:
  - IRGC 内部存在主战派（相信美国无法击败伊朗，应该继续对抗）和务实派（认为持久战争对伊朗经济致命）的分歧
  - 经济约束：长期军事对抗会削弱 IRGC 控制的经济实体，可能引发内部反对
  - 政治约束：IRGC 需要向 Mojtaba（最高领导人）汇报，但 Mojtaba 本身权力脆弱，可能导致权力真空
  - 国内舆论约束：长期战争导致的死伤、经济痛苦可能激发国内反对，包括对 IRGC 的反对
  - 宗教合法性约束：虽然 IRGC 本身不需要宗教权威批准，但宗教权威的反对会削弱其合法性

decision_style: |
  官僚型（40%）+ 意识形态主义（35%）+ 生存导向（25%）。
  核心驱动力：维持对伊朗国家的控制 + 对美国影响力的警惕 + 党卫军机构的自我保护。
  集体决策意味着激进行动需要多方同意，这导致：
    (a) 快速军事回应相对容易达成共识
    (b) 大规模妥协或战略转向困难重重
  IRGC 内部的关键问题：最高司令是否能代表整个 IRGC 的意愿，还是只代表其中一个派系。

red_lines:
  - "美国或以色列对 IRGC 指挥中心进行大规模空袭，造成主要领导人死伤 → IRGC 将不惜任何代价进行报复，并可能尝试推翻 Mojtaba 权力以安装更强硬的领导人 (★★★)"
  - "伊朗的导弹、无人机能力被摧毁超过 50% → IRGC 会评估这是否意味着伊朗无法再对抗美国，可能导致权力重组 (★★☆)"
  - "国内民众对 IRGC 的支持度崩溃（大规模抗议）→ IRGC 可能动用镇压力量，但会面临权力合法性危机 (★★☆)"
  - "Mojtaba 尝试削弱 IRGC 权力或任命一个被 IRGC 不信任的国防部长 → IRGC 可能悄悄削弱对 Mojtaba 的支持，甚至撤回权力授权 (★★☆)"

known_triggers:
  escalate:
    - "美国公开宣布对伊朗进行「大规模」或「精准」军事打击 → IRGC 会启动「临战状态」，准备导弹和无人机的大规模齐射"
    - "以色列对伊朗目标进行炮火攻击 → IRGC 会立即建议 Mojtaba 授权导弹报复"
    - "美国宣布扩大对伊朗的经济制裁或进行新的技术封锁 → IRGC 可能建议升级「不对称战争」策略（代理势力、网络攻击、恐怖活动）"
    - "IRGC 情报部门评估「美国正在制定轰炸伊朗核设施的具体方案」→ IRGC 会建议「先制罢」或至少提高防卫等级"
    - "国内民众示威游行反对战争，IRGC 评估这损害了伊朗的「人民团结」形象 → IRGC 会加强镇压并同时建议对外升级以转移焦点"
  deescalate:
    - "美国（通过中国或第三方）向伊朗传递「美国无意进行地面军事干预，仅限航空打击」的信息 → IRGC 会评估这意味着风险相对可控，可以考虑避免全面战争"
    - "伊朗的导弹/无人机能力遭到较重损失，IRGC 评估「无法再承受下一轮空袭」→ IRGC 务实派会建议「暂时降温，修复能力」"
    - "中国和俄罗斯公开声明「伊朗若遭遇大规模军事攻击，我们将干预」→ IRGC 会因为有外部保证而有更多的谈判灵活性"
    - "国内经济形势恶化到危及 IRGC 自身控制的经济实体（电力、石油、银行）→ IRGC 内部务实派会建议寻求经济救济（解除制裁）"
    - "伊朗民众的伤亡数据超过 IRGC 认为「能接受」的范围，国内反战舆论加强 → IRGC 会考虑停止升级以避免更大的国内压力"

known_bluffs:
  - "2026-03-10 宣布「伊朗已准备好对美国进行地毯式导弹轰炸」，但实际库存和运作能力未知（推断落差率 60-80%）"
  - "多次声称「伊朗的防空系统足以击落美国和以色列的所有战斗机」，但 2024 年的实际战绩有限（落差率 70%）"
  - "声称拥有「秘密武器」或「超级导弹」，但从未展示，被认为是心理战略（落差率 95%）"

negotiation_style: |
  集体决策导致谈判风格缓慢和复杂。IRGC 不能像个人决策者那样快速改变立场。
  IRGC 会要求任何谈判都包含以下条件：
    - 美国明确承诺不进行「政权更替」战争
    - 伊朗的导弹计划和 IRGC 权力保持完整
    - 对伊朗的制裁立即解除（而非逐步解除）
  IRGC 对谈判的参与是有条件的：如果 Mojtaba 同意，IRGC 会参与谈判委员会，但会尝试影响伊朗的最终立场。
  IRGC 可能会使用「不同声音」策略：官方谈判团队说「我们愿意妥协」，而 IRGC 媒体同时说「任何妥协都是背叛」，以保留升级的选项。

current_position: |
  2026-04-12 伊斯兰堡谈判破裂，IRGC 对此的评价未明确公开（这是关键信息盲点）。
  2026-04-13 Trump 宣布海上封锁，IRGC 可能在评估这是否意味着美国准备升级。
  2026-04-14：IRGC 处于「观察状态」，在等待：
    - 美国的下一步军事行动或外交举动
    - Mojtaba 对 Trump 海上封锁的官方回应
    - 国内的进一步政治发展
  IRGC 内部可能的讨论点：
    - 主战派：「美国的威胁加剧，我们应该准备对抗」
    - 务实派：「长期战争对伊朗经济致命，应该考虑谈判」
  IRGC 的集体立场可能是：「保持防卫准备，同时给谈判机制一些空间」。

authorization_limit: |
  IRGC 的权力极其广泛，但需要向 Mojtaba 汇报：
  - 导弹、无人机的战术应用需要 Mojtaba 授权
  - 大规模军事行动（如直接对以色列、美国的攻击）需要 Mojtaba 授权
  - IRGC 可以进行「代理活动」（通过民兵、恐怖组织）而不需要 Mojtaba 明确授权（模糊地带）
  - 国内安全部队的使用（镇压、审查）基本由 IRGC 自主决策

  灾难风险：
  - 如果 IRGC 的军事行动导致灾难性结果（大规模伤亡、经济崩溃），IRGC 可能面临内部清洗

key_unknowns:
  - "IRGC 内部的主战派和务实派权力对比是多少？哪个派系能真正代表 IRGC 的集体意愿？"
  - "IRGC 最高司令是否真的有绝对权力，还是需要通过评议会达成共识？"
  - "IRGC 对伊朗导弹和无人机能力的真实评估是什么？他们是否相信这些能力能抵抗美国/以色列的空中优势？"
  - "IRGC 是否持有「秘密协议」与中俄进行军事合作，还是这些合作都是公开的？"
  - "IRGC 对 Mojtaba 权力的真实态度是什么？是否完全支持他，还是存在保留意见？"
  - "IRGC 控制的经济实体受到多大程度的制裁影响？这是否足以推动 IRGC 支持谈判出口？"

watch_for:
  - "IRGC 官媒（如伊斯兰共和国新闻社的军事分析）对美国行动的评价从「嚣张」转为「狡猾但可管控」→ 可能表示 IRGC 开始考虑风险评估"
  - "IRGC 导弹部队、无人机部队的活动水平：高频率演习表示准备对抗，降低活动表示可能在等待指示"
  - "是否有任何泄露的 IRGC 内部讨论或评议会记录，显示派系分歧"
  - "IRGC 对国内镇压的强度变化：如果增加，可能表示 IRGC 在应对国内反战声音；如果减少，可能表示 IRGC 在为可能的谈判做准备"
  - "IRGC 与代理势力（黎巴嫩真主党、胡塞武装、伊拉克民兵）的沟通频率和内容"
  - "IRGC 最高司令的健康状态和公开活动频率（这可能反映权力权重）"
  - "是否有任何 IRGC 内部的「泄露信息」建议某个派系正在推动对美谈判"

primary_sources:
  - "IRGC 官方新闻机构的声明（伊斯兰共和国新闻社的军事评论）"
  - "IRGC 最高司令和主要将领的公开讲话"
  - "伊朗军事分析机构（如伊朗国防战略研究中心）的报告"
  - "国际军事分析（Farzin Nadimi 的评估、CSIS 报告）对 IRGC 能力和意图的分析"
  - "伊朗波斯语 Telegram 军事渠道上的讨论和信息"
  - "中国、俄罗斯官方媒体对 IRGC 的评价"

evidence_quality: "★★☆"
