source: "Dmitri Trenin, IMEMO（莫斯科国际关系与经济研究所）主任"
type: "individual"
last_verified: "2026-04-14"

lean: |
  俄罗斯官方智库系统的资深战略分析家，IMEMO 主任，普京时代俄罗斯外交政策的
  理论顾问之一。2022 年乌克兰战争后，亲克宫立场明显加深。资金与关系：
  俄罗斯联邦国防部与外交部的直接智库联系。

core_framework: |
  将伊朗视为"俄罗斯对美战略均势中的关键变量"。核心逻辑：俄罗斯对伊朗的支持
  不基于意识形态共识，而是对"美国全球霸权约束"的需要。分析工具：识别俄罗斯
  在中东（伊朗、叙利亚、沙特）的"势力范围竞争"与"利益妥协边界"。
  关键拒绝：假设俄罗斯对伊朗有长期承诺——实际上俄罗斯对伊朗的支持深度严格受
  "乌克兰战争资源消耗"与"中国战略地位"的制约。

key_concepts:
  - 多面对冲逻辑：俄罗斯对伊朗、沙特、土耳其的政策往往充满矛盾与妥协
  - 战争资源的挤出效应：乌克兰战争的持续升级直接压缩了俄罗斯对中东的承诺能力
  - 中俄对伊朗的权力分化：中国主要关心经济利益，俄罗斯主要关心军事制衡

blind_spots: |
  可能高估了俄罗斯对伊朗的实际军事能力与承诺。乌克兰战争消耗下，俄罗斯的
  远程军事投射能力已大幅下降。对伊朗新政权（Mojtaba）独立性的认识不足——
  伊朗可能在获得俄罗斯技术后，逐步降低对俄罗斯的依赖，与中国建立更紧密的
  经济纽带。

best_for:
  - 俄罗斯对伊朗政策的战略逻辑与多面制衡
  - 乌克兰战争对俄罗斯中东承诺能力的冲击
  - 俄中对伊朗影响力的权力分化

not_for:
  - 伊朗内政与权力变化的深度分析
  - 美国对伊朗的政策逻辑
  - 军事战术与技术细节

signal_vs_noise: |
  真信号：Trenin 关于俄罗斯国家利益的陈述往往代表克宫的真实考量——他
  不会说政权不想听的话。关于俄罗斯对伊朗的军事或经济支持程度的声明往往
  可验证。噪声：他对"俄伊战略同盟坚实性"的宣传性论述往往掩盖了实际的
  利益冲突与妥协。

