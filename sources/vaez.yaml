source: "Ali Vaez，International Crisis Group（ICG）伊朗项目主任"
type: "individual"
last_verified: "2026-04-14"

lean: |
  ICG 自我定位为「危机调停者」，资金来源多元（美国、欧洲、中东基金会）。
  Vaez 本身具有伊朗背景，曾在伊朗核谈判中作为追踪者参与，亲眼目睹了
  JCPOA 过程。他的分析更贴近伊朗决策层逻辑，但仍然致力于调停而非支持伊朗。
  总体框架对伊朗有一定同情但并非亲伊。

core_framework: |
  从「伊朗的不信任从何而来」反推其对安全保障的定义。他认为伊朗对国际承诺的
  怀疑不是策略伪装，而是 1953 政变、伊拉克战争、制裁反复的创伤遗留。
  因此「伊朗为何拒绝零浓缩」「为何坚持弹道导弹计划」不是狂妄，而是对
  「单边毁约历史」的理性防御反应。

key_concepts:
  - "不信任作为制度遗产" —— 伊朗的疑虑是历史伤痕，不是领导人性格缺陷
  - "安全保障定义的不对等" —— 西方说「停浓缩就安全」，伊朗说「保有浓缩权利才安全」
  - "协议脆弱性" —— 一个大国单方面退出（如 Trump 2018）会永久摧毁伊朗对多边机制的信心

blind_spots: |
  （1）他对伊朗决策层对话的接触可能被选择性呈现——官方谈判代表会向他表达「开放姿态」，
  但真正的IRGC 和核武库决策者不会直接对话。因此他对「伊朗真实想要什么」的判断
  可能被高估了。
  （2）关于 Khamenei 健康和权力继承的预测：他长期看好「温和派有机会上升」，但
  Mojtaba Khamenei 的继任和 IRGC 权力巩固，表明他对伊朗权力平衡的理解可能滞后。
  （3）他倾向于认为「对话总是可能」，低估了伊朗政治中的不可调和矛盾
  （如核权利 vs. 西方安全需求）。

best_for:
  - 理解伊朗为何对国际协议有系统性的怀疑和保护性条款要求
  - 评估谈判中「伊朗真实的红线」与「表面立场」的区别
  - 分析伊朗如何在国际孤立与战争压力下维持核计划的政治合法性
  - 理解伊朗精英如何看待与美国重新接触的可能性

not_for:
  - 伊朗核技术的具体进展和时间线
  - IRGC 军事能力的量化评估
  - 以色列军事威胁的技术分析

signal_vs_noise: |
  信号：他对「伊朗为什么说什么」的文化和历史解读——来自多年接触和学术训练。
  噪音：他有时过度浪漫化伊朗温和派的存在和影响力，2026 年 Mojtaba 继任后
  显示「温和派」在军事威胁下的话语权进一步缩小。他关于「谈判仍有机会」的乐观
  在 4 月 12 日伊斯兰堡破裂后受到考验。他的预测现在需要针对新领导层重新校准。

