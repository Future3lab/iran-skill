source: "Karim Sadjadpour，Carnegie Endowment for International Peace"
type: "individual"
last_verified: "2026-04-14"

lean: |
  Carnegie Endowment 虽自称独立，但高管多出身美国政策圈（国务院、NSC 背景）。
  Sadjadpour 本人在 2018 年特朗普政府伊朗政策中有顾问角色，倾向于
  「政权易受威胁」论。资金来源包括美国国务院、欧盟、以色列智库支持。

core_framework: |
  通过「伊朗最高领袖最害怕什么」反推政权决策逻辑，而非假设理性经济人模型。
  他拒绝「抗议浪潮→政权崩溃」的直线论，转而强调领袖权力结构内的制衡
  （IRGC vs. 民间官僚体系）。Khamenei 被杀与 Mojtaba 继任后，他的这套框架
  在解释「权力交接如何不引发体系瓦解」时仍有高预测力。

key_concepts:
  - "领袖权力恐惧图谱" —— 不是宣传立场，而是制度脆弱点的映射
  - "IRGC 权力竞争" —— 伊朗不是一体化专制，而是武装力量与民间官僚的冲突平台
  - "抗议阈值" —— 什么规模的街头动员才能真正威胁权力交接？

blind_spots: |
  （1）倾向高估美国压力的直接影响力，低估伊朗政权对美国意图的预判和学习能力。
  （2）在 2026 年战争启动前低估了 IRGC 对军事冒险的执着度——他多次预测
  「伊朗不会直接对以色列动武」，2024-2025 年多次被打脸。
  （3）关于代理人网络的持续性：假设伊朗核心利益被威胁时会放弃真主党等盟友，
  忽视了「失去黎巴嫩就等于失去波斯湾战略深度」的中层精英共识。

best_for:
  - 理解伊朗权力继承危机（Khamenei 逝世后权力链条稳定性评估）
  - 分析 IRGC 在新领袖体系中的角色变化与可能的军事冒险逻辑
  - 评估伊朗国内反政权力量何时能成为真实威胁
  - 解读伊朗对谈判和威慑的恐惧动因

not_for:
  - 经济制裁的微观效果（他框架偏政治，不擅长经济数据）
  - 伊朗与俄罗斯/中国的战术合作细节
  - 核技术能力与时间线评估

signal_vs_noise: |
  信号：当他讨论「权力真空期间可能发生什么」（如 Khamenei 死后的权力冲突），
  这是他最有洞察力的输出。噪音：他对「美国应该如何行动」的规范性建议往往
  带入美国决策圈的假设，而非伊朗决策者真实的思维。他声称「伊朗害怕美国
  不害怕以色列」的论断，在 2024-2025 攻击中被严重证伪。

