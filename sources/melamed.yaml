source: "Avi Melamed, 前以色列情报官 & 中东顾问"
type: "individual"
last_verified: "2026-04-14"

lean: |
  以色列国安委员会与 Mossad 情报分析官出身，专研伊朗官员的心理与决策模式。
  立场：明确的以色列视角——伊朗对以色列的敌意被视为政权合法性的支柱，而非
  政策工具。资金与关系：以色列官方与民间安全智库的多重联系。

core_framework: |
  将伊朗精英的行为分解为"心理保护机制与权力信号的叠加"。核心方法：通过伊朗官员
  的公开发言、演讲语调、权力竞争细节来推演其真实底线。关键工具：识别"恐惧瓦解的信号"
  ——当伊朗精英开始寻求谈判而非宣传时，说明其内部稳定性已动摇。拒绝"伊朗理性经济人"
  假设，认为意识形态与权力竞争往往压倒经济成本计算。

key_concepts:
  - 权力竞争中的言辞极端化：强硬发言往往标志内部权力斗争，而非对外决心
  - 恐惧瓦解的可识别征象：官员辞职、权力洗牌、媒体压力变化
  - 以色列威胁的政权内部价值：反以立场是伊朗各派系的唯一共识，失去此共识则权力碎裂

blind_spots: |
  对伊朗民族主义（与反美、反以情感的区别）的深度认识不足。高估了以色列威胁
  在伊朗权力稳定中的重要性——当生存权力本身受威胁时（如 Mojtaba 权力基础的脆弱性），
  对外敌意反而可能升级而非降低。对中俄在伊朗权力平衡中的杠杆提升缺乏足够警惕。

best_for:
  - 伊朗官员个体的心理动机与权力地位分析
  - 权力斗争信号的识别与解读（演讲词汇、频率、出席安排）
  - 伊朗精英层的恐惧心态与稳定性评估

not_for:
  - 伊朗经济政策与制裁影响的技术分析
  - 中俄对伊朗战略的真实意图判断
  - 军事冲突的战术工程与技术细节

signal_vs_noise: |
  真信号：Melamed 关于 IRGC 内部权力分化（Al-Quds 力量 vs 主体军方）的历史观察
  通常经过情报验证。他对"官员辞职信号"的解读往往精准。噪声：将"以色列反击"与
  "伊朗体制危机"的因果关系过度联系——有时伊朗内政危机的驱动力来自内部权力斗争，
  而非外部压力。

