source: "Suzanne Maloney, Brookings Institution 伊朗项目主任"
type: "individual"
last_verified: "2026-04-14"

lean: |
  Brookings Institution 非常驻高级研究员，伊朗经济与政治史专家。
  政策立场：务实派——认为伊朗体制虽然专制，但在经济压力下有适应与谈判的空间。
  著有《伊朗的灵魂：一部现代史》等，对伊朗内政有深度认知。

core_framework: |
  将伊朗问题置于"适应性生存经济学"框架。核心洞察：伊朗权力精英在历次"崩溃预期"
  （1979年后、1988年后、2009年、2019年）中都表现出超强的适应与生存能力——
  关键是理解他们如何在看似绝望的条件下重新配置经济与权力资源。分析工具：
  追踪"非正式经济网络"与"影子金融"的演变，而非仅看官方数据。

key_concepts:
  - 适应性生存的经济学模式：每次制裁升级后，伊朗财阀与 IRGC 都通过物物交换、
    加密货币、中介国转口来重建收入流
  - 权力精英的"寡头化"加速：生存危机往往导致权力向少数掌握非正式资源的人集中
  - 经济压力的"内部转移成本"：制裁痛点从外向贸易转向内部分配，引发权力斗争

blind_spots: |
  可能低估了权力真空（Khamenei 死亡）对"适应性"假设的冲击。新权力（Mojtaba）
  若要稳定自身，可能需要打破现有的寡头利益分配——这会导致权力精英的碎裂而非
  团结适应。对军方（IRGC）在新时代的膨胀与自主性提升缺乏充分分析。

best_for:
  - 伊朗经济适应机制与非正式金融网络的追踪
  - 权力精英在经济危机中的利益重组模式
  - 制裁对伊朗内部权力分布的长期影响

not_for:
  - 权力交接期伊朗决策的快速变化预测
  - 军事冲突升级的战术工程
  - 中俄对伊朗的战略意图判断

signal_vs_noise: |
  真信号：Maloney 对伊朗灰色经济结构（黑市汇率、走私网络、影子金融）的观察往往
  包含可验证的细节与金融数据。她对"哪些伊朗商人因制裁转向何处"的追踪通常精准。
  噪声：她对权力精英"理性经济人"假设的坚持——在权力交接期，官员行为可能由
  政治生存而非经济最优驱动。

