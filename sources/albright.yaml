source: "David Albright，ISIS（Institute for Science and International Security）主任"
type: "individual"
last_verified: "2026-04-14"

lean: |
  ISIS 由 Albright 本人在 1992 年创办，定位为非营利性核安全研究机构。资金来源
  包括美国政府基金、欧洲基金会、以色列智库支持。虽然标榜学术独立，但其创始人
  和主要员工有很强的「核扩散威胁」意识形态，在伊朗核问题上立场明确地支持
  遏制。这不是偏见而是明确的使命。

core_framework: |
  用「卫星图像+IAEA 公开数据+技术原理」的组合方法，对伊朗核设施进行
  准实时的能力评估。每当伊朗有重大核举动（新浓缩进展、设施升级）或被轰炸，
  他会最快速地发布基于卫星图的技术评估报告。他是「核情报民主化」的倡导者——
  将原本被限制在政府的卫星分析能力开放给学术圈。

key_concepts:
  - "开源核情报" —— 利用商业卫星和公开信息做核能力评估
  - "IAEA 报告解读" —— 从联合国核监察机构的技术细节中提取威胁信号
  - "设施升级追踪" —— 离心机、浓缩密度、产能的卫星识别与评估

blind_spots: |
  （1）他的分析高度依赖于商业卫星图的质量和时频。如果伊朗采取伪装或
  地下设施，他的评估会缺失。2026 年战争期间如果伊朗有秘密核设施被启用，
  他可能无法及时发现。
  （2）他倾向于对伊朗核能力做「最坏情景」评估，因为这符合他机构的使命
  （强调威胁）。当面对不确定信息时，他会倾向「伊朗可能已经做到」而非
  「伊朗还做不到」。这种保守估计在应对政策中有用，但在预测伊朗实际进展时
  可能过度悲观。
  （3）他对伊朗核武器小型化和弹头集成的评估缺乏内幕信息，只能基于
  朝鲜和巴基斯坦的类比，真实情况可能差异很大。

best_for:
  - 获取关于伊朗核设施最新卫星图像分析（最快的来源）
  - 评估伊朗浓缩进展的技术细节（产能、浓度、库存）
  - 理解美以打击后伊朗核设施的损毁程度和恢复难度
  - 追踪 IAEA 报告中的关键数据并翻译成技术威胁评估

not_for:
  - 伊朗的政治决策与意图
  - 伊朗与朝鲜、俄罗斯的合作细节（超出卫星能看到的）
  - 伊朗国内政治对核计划的影响

signal_vs_noise: |
  信号：他的卫星图分析和技术计算——这源于真正的物理知识和多年的
  核设施观察经验。噪音：当他评论「伊朗何时能有核武器」时，往往倾向
  最坏情景，这是机构文化使然而非证据驱动。他在 2015-2018 年多次声称
  「伊朗突破在即」，但并未发生——这反映了对伊朗技术挑战的低估。
  2026 年美以空袭后，他应该是提供最准确「现状评估」的来源，但他对
  「伊朗备份方案和秘密设施」的猜测可能会过度膨胀威胁感。

