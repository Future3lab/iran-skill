source: "Julia Masterson，RAND Corporation（兰德公司）"
type: "individual"
last_verified: "2026-04-14"

lean: |
  RAND 是美国主要的国防智库，直接承接国防部和军方合同。Masterson 从事
  伊朗核扩散风险评估工作，部分研究由美国国防部资助。虽然学术严谨，但框架
  和优先级反映美国战略利益——关注的是如何遏制伊朗核扩散风险，而非理解伊朗
  的逻辑。

core_framework: |
  用「核出口坡道与时间成本」的量化分析评估伊朗核突破的可能性。她的方法是：
  追踪伊朗每步浓缩进展所需的物料、离心机产能、电力需求，计算出「达到
  兵器级浓缩需要多长时间」。这是纯技术分析，不涉及政治动因，因此可以给出
  高置信度的时间窗口估计。

key_concepts:
  - "核出口坡道" —— 从低浓缩到兵器级的物理路径和时间估计
  - "IAEA 监控盲区" —— 设施被销毁或协议终止后，追踪能力丧失的风险
  - "离心机产能" —— 伊朗 IR-6 及后续新型号的部署速度与产能增长轨迹

blind_spots: |
  （1）她的模型假设伊朗有「浓缩突破」的明确技术目标，但不考虑政治和外交
  的制约——伊朗可能技术上能做但政治上不敢做，或者被外部打击中断。2026 年
  美以空袭后，她对后继设施恢复的时间线需要重新评估。
  （2）关于未申报核设施：她的计算基于 IAEA 已知设施，但如果伊朗有秘密的
  核加工地点，她的时间估计会完全失效。
  （3）她对伊朗是否会「走向核武器」的政治决策缺乏深度分析，倾向于假设
  「能做就会做」。

best_for:
  - 估算伊朗从当前状态达到兵器级浓缩的物理时间窗口
  - 评估美以打击后伊朗重建核能力需要的时间和资源
  - 技术层面的核扩散风险量化
  - IAEA 能力与伊朗突破的竞速关系

not_for:
  - 伊朗是否会政治决策地追求核武器（这需要政治分析）
  - 伊朗决策层对浓缩权利的象征意义理解
  - 伊朗与其他国家的核合作谈判内容

signal_vs_noise: |
  信号：她的时间线估计是基于公开技术数据的可靠计算。噪音：她有时在评论
  中说「伊朗可能秘密部署」或「可能有未申报设施」，这种推测超出了她的
  证据范围，反映的是分析师的保守性偏见而非实证。2026 年美以空袭后，
  她是最早提供「恢复时间线」评估的来源，但这类预测高度依赖于对伊朗
  备份设施和资源的假设，可靠度有限。

