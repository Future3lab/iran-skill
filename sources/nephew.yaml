source: "Richard Nephew, 哥伦比亚大学中东研究所 & 前美国财政部国务次官助理"
type: "individual"
last_verified: "2026-04-14"

lean: |
  强硬制裁架构师。曾主导奥巴马政府对伊朗一阶段制裁体系设计。
  认为制裁应"可逆"但"可信"，反对象征性制裁。资金与政策倾向：美国官方战略共识。

core_framework: |
  将制裁视为经济工程学，而非道德宣示。核心方法：通过计算单笔交易的收益-风险比，
  迫使伊朗经济参与者主动退出美元系统。拒绝"制裁失败"论——关键不在制裁强度，
  而在一致性执行与绕制成本的精确计算。

key_concepts:
  - 浮动成本逻辑：制裁痛点会动态转移，需持续调整堵口而非固定清单
  - 次级制裁的信号机制：对第三国金融机构的"借记"比对伊朗直接冻结更有效
  - 霍尔木兹通道监控的经济等价物：海事追踪技术可弥补石油贸易的地下化

blind_spots: |
  低估制裁体系对制裁方自身经济成本的累积。对"绕制联盟"（俄中欧）的凝聚力评估不足，
  特别在地缘冲突升级后的再分配效应。Khamenei 死亡后权力真空条件下，
  制裁杠杆的可转移性假设可能失效。

best_for:
  - 制裁执行层技术设计与堵漏战术
  - 金融追踪工具对伊朗经济的具体制约机制
  - 制裁一致性成本的分析（何时盟友脱离）

not_for:
  - 伊朗内政权力转移的预测
  - 伊朗军事决策的动机分析
  - 中长期地缘均势重构

signal_vs_noise: |
  真信号：Nephew 区分"正式制裁清单"与"实际执行黑名单"的差异，
  真实痛点出现在后者的扩展速度。噪声：公开演讲中关于制裁"对话友好性"的温和表述
  ——内部政策文件显示他对可逆性的要求其实很高。

