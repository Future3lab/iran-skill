source: "Rob Malley, 前伊朗问题总统特使（拜登政府）& 国际危机小组主席"
type: "individual"
last_verified: "2026-04-14"

lean: |
  拜登政府主导 2021-2022 维也纳 JCPOA 复兴谈判的首席谈判代表。
  2023 年被美国司法部调查"未授权披露敏感情报"——职业信誉受损但政策理念未改。
  立场：伊朗协议可行，但需要美方首先展示信誉恢复。

core_framework: |
  将美伊关系视为"信誉黑洞"——美国退出 JCPOA 的历史创伤使伊朗方对任何承诺持深层怀疑。
  核心方法：通过识别"可验证的对等承诺"（rather than纸面协议）来重建信任。
  拒绝"强制变革"框架——认为伊朗权力精英无法被外部压力改造，只能被激励重新计算。

key_concepts:
  - 信誉赤字的动态成本：每次美国政策反转将伊朗对话成本乘以2
  - 红线的真实深度测试：维也纳谈判中伊朗撤退的边界往往比初始立场提升30%
  - 权力继承中的对话授权转移：新领导班子需要重新证明自己的谈判权限

blind_spots: |
  严重低估 Mojtaba 新政权在军方压力下的"强硬化"空间。对伊朗内部权力学的分析
  停留在前 Khamenei 时代的制衡框架。2026 年 4 月临时停火破裂后，其信任重建模式
  的可行性已大幅下降。对中俄在伊朗中的杠杆提升缺乏充分警惕。

best_for:
  - 美伊历史谈判突破点的模式识别
  - 伊朗权力内部对话授权的权力图谱
  - 信誉修复的阶段成本评估

not_for:
  - Khamenei 后伊朗权力稳定性判断
  - 中俄介入对美伊谈判的冲击
  - 军事升级周期中伊朗决策过程

signal_vs_noise: |
  真信号：Malley 对伊朗各派系谈判底线的细节记忆（特别是 IRGC vs 外交部的分歧），
  这些来自一线经验。噪声：他在任后对政策"客观必然性"的论述——卸任后的辩护性
  说法往往低估了自身判断的时代局限。

