source: "Seyed Hossein Mousavian，普林斯顿大学，前伊朗首席核谈判代表"
type: "individual"
last_verified: "2026-04-14"

lean: |
  Mousavian 是伊朗内部的改革派代表，2003-2005 年伊朗与欧盟核谈判的主谈手，
  后因伊朗政局变化流亡西方。在普林斯顿教职以及多项欧美研究基金支持。
  他对伊朗持批评态度，特别是对保守派和 IRGC 权力扩张。框架带有伊朗改革派
  的理想主义，但基于一手谈判经验。

core_framework: |
  通过「伊朗为什么把浓缩权利视为不可谈判的主权象征」来解释核问题的僵局。
  他认为在伊朗国内政治中，放弃浓缩等同于「背叛』——因为伊朗在 1953 政变后
  被剥夺了民族的技术自决权，浓缩权利成了「伊朗主权」在技术层面的最后防线。
  任何领导者若同意零浓缩，会被攻击为「汉奸」，这是制度性的，不是某个人的固执。

key_concepts:
  - "浓缩权利=民族主权" —— 在伊朗话语中，这不是技术问题而是身份问题
  - "国内政治制约" —— 伊朗领导人无法在国内政治上接受「完全放弃」，即使对伊朗有利
  - "JCPOA 为什么失败" —— 不是伊朗违反，而是特朗普的退出打碎了伊朗国内的「合作派」信心

blind_spots: |
  （1）他对伊朗现任 IRGC 主导权力结构的预测长期过于悲观。他曾预言
  「IRGC 权力扩张会导致伊朗经济崩溃」，但 2026 年战争启动时伊朗体系仍在运转，
  IRGC 在动员资源上显示了意外的效能。
  （2）关于伊朗与俄中关系：他早期认为伊朗与俄罗斯的联盟是被迫的战术选择，
  低估了这个同盟的深度和俄伊在乌克兰战争中的利益一致性。
  （3）他对「伊朗改革派上台可能性」的判断在 Mojtaba 继任后进一步黯淡，
  但他可能仍在寻找希望迹象而高估了温和派在 IRGC 掌权下的存活空间。

best_for:
  - 理解「为什么伊朗不能同意零浓缩」——这是国内政治铁律，不是谈判虚张声势
  - 评估任何核协议必须包含什么条款才可能被伊朗国内政治接受
  - 分析 JCPOA 失败的根本原因（不仅是伊朗违反，而是美国单方面毁约摧毁了伊朗国内合作派）
  - 理解伊朗改革派与保守派在核政策上的根本性分歧

not_for:
  - IRGC 军事能力与战争指挥
  - 伊朗与俄中的军事合作细节
  - 核设施的技术升级评估（他强项是政治而非技术）

signal_vs_noise: |
  信号：他对「伊朗决策层为什么说什么」的解读——来自多年的直接对话经验和
  伊朗政治文化理解。噪音：他有时过度强调「改革派还有机会」或「如果西方更友善
  伊朗会配合」的论调，这倾向于反映他个人的政治立场而非现实的权力平衡。
  2026 年后 IRGC 更加巩固权力，他关于「可能性」的判断需要显著下调。
  他的价值在于解释「为什么」，而非预测「什么时候」。

