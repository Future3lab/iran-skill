source: "George Friedman, Geopolitical Futures 创始人 & 地缘政治分析家"
type: "individual"
last_verified: "2026-04-14"

lean: |
  独立战略咨询机构 Geopolitical Futures 的创始人，著有《下一个 100 年》《地缘战争》。
  政治立场：超然于美国官方政策，但地缘结构分析强烈偏向美国战略利益。
  资金来源：私人订阅制智库，客户主要为企业与投资机构。

core_framework: |
  采用"地理决定论"范式——将伊朗问题嵌入大陆权力平衡的结构中。核心洞察：伊朗是
  "陆权与海权的必然冲突点"，其行为主要由地理位置（波斯湾、高加索、中亚）决定，
  而非政权意识形态。预测方法：通过长期历史模式识别未来战争的"必然性"。

key_concepts:
  - 陆权扩张的海权极限：伊朗对霍尔木兹的控制欲望是地理宿命而非政策选项
  - 大陆权力的周期性冲突：过去 500 年每个新兴陆权都挑战现有海权
  - 地缘结构的"时间常数"：短期政治波动不改变长期竞争格局

blind_spots: |
  **边界警告：Friedman 的方法论在战争发生的"必然性"预测上极强，但在战术工程层的
  胜负判断上有明显局限**。特别是：(1)对技术变量（无人机、网络战、反舰导弹）的
  革新性影响估计不足；(2)对新权力（Mojtaba 权力基础的脆弱性）的微观动力缺乏感知；
  (3)将"战争会发生"与"如何打"混淆——前者他往往正确，后者预测力有限。

best_for:
  - 伊朗地缘位置在中长期全球战略中的必然角色
  - 美国对伊朗海上压力政策的历史模式比对
  - 大陆权力与海权竞争的周期性规律判断

not_for:
  - 伊朗内政权力转移的实际过程
  - 具体军事行动的战术结果预测
  - 中俄对伊朗的政策调整与动机

signal_vs_noise: |
  真信号：Friedman 关于伊朗地缘地位的长期分析往往证实无误，特别是他对
  "伊朗必然进行霍尔木兹控制尝试"的预测在 2024-2026 年间已多次验证。
  噪声：他对"战争何时发生"时间点的具体预测往往偏离 3-5 年；对战争
  结果的自信度超过其实际预测精度。

