source: "Miad Maleki, 民主保卫基金会（FDD）& 前美国财政部制裁官员"
type: "individual"
last_verified: "2026-04-14"

lean: |
  FDD 是强硬鹰派智库，亲以色列立场明确。Maleki 曾任财政部伊朗制裁定向打击部副主任，
  技术官僚出身。政策偏向：最大压力战略的执行设计师。

core_framework: |
  将伊朗问题视为"制裁堵漏工程"，关注单笔交易层的技术细节而非宏观杠杆。
  核心视角：银行合规系统的脆弱点在于人为审核的时滞——通过自动化筛选与实时黑名单可将
  绕制成本提升至100倍。拒绝谈判框架论，认为经济压力必须持续升级才能改变伊朗行为。

key_concepts:
  - OFAC 筛选引擎的精准度优化：从名单匹配到行为模式识别
  - 港口监管与航运单据的追踪链路：石油贸易的"最后一公里"堵口
  - 汇兑漏洞的数学模型：在多币种体系中的跨境转移时间差

blind_spots: |
  极度低估制裁疲劳对美国盟友的政治成本。Khamenei 死亡与 Mojtaba 权力更替后，
  制裁对象的决策逻辑可能从"经济最优化"转向"权力稳定化"——原有交易成本计算失效。
  对伊朗地下金融网络的真实规模认知不足。

best_for:
  - 制裁执行的战术技术层（银行、航运单据、电汇）
  - 特定企业或个人资产冻结的可行性评估
  - 最大压力政策周期内的伊朗经济数据解读

not_for:
  - 伊朗权力精英的心理动机分析
  - 中俄关键节点的政治决策
  - 军事冲突升级的战略转折点判断

signal_vs_noise: |
  真信号：Maleki 关于具体制裁工具升级（电汇黑名单扩展、港口追踪增强）的论述包含
  技术细节，可验证。噪声：关于制裁"必然导致体制变化"的宏观论断——他的记录里缺乏
  对失败案例的反思。

primary_urls:
