source: "Farzin Nadimi，Washington Institute for Near East Policy（WINEP）"
type: "individual"
last_verified: "2026-04-14"

lean: |
  华盛顿研究所（WINEP）虽自称独立，但长期与美国以色列公共事务委员会（AIPAC）
  和美国国防部有密切联系，主要资金来自美国和以色列的亲以色列基金会。
  Nadimi 的研究围绕伊朗军事威胁评估，框架明确的亲美以，支持对伊朗军事遏制。
  这不是秘密——他多次公开论述伊朗对中东稳定的威胁。

core_framework: |
  用「IRGC 能力现状评估」和「弹道导弹库存追踪」来量化伊朗军事威胁。他的方法是
  逐一分析 IRGC 的各类导弹系统、无人机、海军能力，估算其射程、精度、生产产能，
  最后得出「伊朗真实能做什么」的评估。这是纯军事技术分析，不涉及伊朗意图，
  因此结论通常是「伊朗能力足够威胁地区」。

key_concepts:
  - "IRGC 现役武器库" —— 导弹、无人机、海军的具体型号和数量统计
  - "弹道导弹产能" —— 伊朗年度导弹生产能力与扩大的趋势
  - "精度提升" —— 伊朗导弹精准度的代际改进和对地区军事平衡的影响

blind_spots: |
  （1）他的分析聚焦伊朗军事现状和近期扩张，但低估了战争中的损耗和伊朗
  资源有限的约束。2026 年美以空袭摧毁了伊朗大量导弹库存和生产设施，
  他关于「伊朗威胁不断增长」的预测被中断，现在需要对伊朗战争后恢复能力
  做新评估。
  （2）他倾向于高估伊朗武器系统的有效性。例如，伊朗导弹的精度远低于
  美国宣传的水平，大量被以色列空防系统拦截，但他的报告有时会基于伊朗
  宣传数据而高估射程和精度。
  （3）关于伊朗与俄罗斯的军事合作：他对俄伊之间的技术转移和战争支持
  的深度分析不足，倾向于单独评估伊朗能力而忽视外部支持的作用。

best_for:
  - 获取伊朗 IRGC 现役武器系统的详细清单和规格
  - 评估伊朗对地区主要目标（以色列、美国基地、油轮）的军事威胁程度
  - 追踪伊朗导弹产能和部署的最新情报
  - 理解美以防御体系（铁穹、大卫投石)需要面对的威胁复杂度

not_for:
  - 伊朗为什么使用这些武器（意图分析）
  - 伊朗与俄中的军事合作深度
  - 伊朗核武器能力与时间线

signal_vs_noise: |
  信号：他对伊朗军事硬件的具体统计数据——这源自卫星图像、贸易追踪、伊朗
  公开声明的仔细汇总。噪音：当他评价威胁程度时，往往投射以色列和美国的
  安全关切，结论容易被亲以色列的政策偏见影响。2026 年战争后，他关于
  「伊朗威胁不减」需要大幅调整，美以空袭的效果远超预期。他的价值在于
  「伊朗有什么」，而非「伊朗会怎么用」。

