source: "华黎明，中国前驻伊朗大使 & 外交部中东司原司长"
type: "individual"
last_verified: "2026-04-14"

lean: |
  中国外交系统资深伊朗问题专家，曾任驻伊朗大使（1998-2002）与外交部中东司司长。
  政治立场：中国官方视角，但作为外交官，发声时相对务实而非宣传性。
  资金关系：中国外交部与官方智库的直接代表，对伊朗事务有第一手外交记忆。

core_framework: |
  将伊朗问题嵌入"中国对美战略平衡"的大框架。核心逻辑：中国对伊朗的支持程度取决于
  "对美关系成本-收益比"——当中美关系恶化时，伊朗价值提升；当寻求中美稳定时，
  伊朗可以被部分牺牲。分析方法：识别"中国真实承诺的底线"（如军事支持、经济救援）
  与"宣传性支持"的差异。关键拒绝：盲目假设"中伊铁血同盟"。

key_concepts:
  - 战略工具化：伊朗对中国的价值是对美平衡，而非盟友关系的本质
  - 成本敏感性：中国对伊朗的支持会因对美贸易战、科技制裁等因素动态调整
  - 权力交接中的观望态度：Mojtaba 新政权初期，中国倾向"既不过度支持也不放弃"

blind_spots: |
  对伊朗精英层对中国承诺的实际信任度可能高估。当伊朗陷入生存危机时，
  中国经济利益（如 Belt and Road）的优先级可能超过伊朗政权稳定。
  对俄罗斯在伊朗问题上对华影响力的上升缺乏充分认识。

best_for:
  - 中国对伊朗政策的战略逻辑与中美平衡的关系
  - 中国在伊朗经济中的实际权重与依赖程度
  - 权力交接期中国对新伊朗政权的政策调整

not_for:
  - 伊朗内部权力斗争的细节分析
  - 美国对伊朗政策的决策过程
  - 军事冲突的战术与技术细节

signal_vs_noise: |
  真信号：华黎明在公开场合关于"中伊关系现状"的表述往往代表官方底线，
  他不会虚言承诺超出政府政策的内容。噪声：官方宣传中关于"战略伙伴关系"
  的修辞往往高估了实际承诺深度——特别是在伊朗面临多重威胁时。

primary_urls:
