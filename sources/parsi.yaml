source: "Trita Parsi, Quincy Institute 伊朗项目主任 & 著作家"
type: "individual"
last_verified: "2026-04-14"

lean: |
  Quincy Institute 为美国非干涉主义智库，Parsi 是伊朗问题研究主任。
  政策立场：批评美国对伊朗的长期对抗政策，认为谈判与理解应优先于制裁。
  著有《背叛的盟友》《美伊冲突的真相》等，对美伊关系历史有深度研究。

core_framework: |
  将美伊冲突放入"历史重复与路径依赖"的框架。核心方法：通过对比 1979 革命、
  两伊战争、利比亚模式等历史事件，识别伊朗精英决策的"历史恐惧模式"。关键洞察：
  伊朗对美国的敌意往往源于对"被背弃"与"被推翻"历史的创伤记忆，而非意识形态必然性。
  拒绝：美国可通过制裁或军事优势改造伊朗体制的幻想。

key_concepts:
  - 历史创伤的决策锚定：1953 政变推翻、伊朗人质危机、伊拉克战争支持的美国，
    伊朗精英对"美国承诺"的折扣率高达 80%
  - 模式识别框架：利比亚去核化后被推翻→伊朗拒绝相同路径；两伊战争中美国支持伊拉克
    →伊朗对美国"和平倡议"的天然怀疑
  - 权力继承中的历史记忆转移：新领导班子往往强化"反美防御"以证明合法性

blind_spots: |
  对伊朗权力精英中"反美"立场已部分内生化为意识形态（而非仅为政策工具）的认识不足。
  高估了"理解与谈判"在当前权力真空中的可行性——Mojtaba 新政权可能需要强硬立场来
  建立权力合法性，而非寻求缓解。对中俄在伊朗问题中的新角色上升缺乏充分警惕。

best_for:
  - 美伊关系的长期历史模式比对
  - 伊朗对美政策变化的历史根源分析
  - 和平谈判与对抗政策的历史循环规律

not_for:
  - 当前权力交接背景下的伊朗决策预测
  - 军事冲突升级时的战术判断
  - 中俄介入对伊朗的实际影响评估

signal_vs_noise: |
  真信号：Parsi 对美伊外交破裂的历史时间点（1953、1979、2018）与其伊朗政策转折
  的因果链条往往经得起历史验证。他对"伊朗为什么拒绝某协议"的历史解释通常包含
  真实的创伤记忆线索。噪声：他对当前伊朗改革派与温和派力量的评估往往偏乐观
  ——这些力量在权力交接期可能被边缘化。

