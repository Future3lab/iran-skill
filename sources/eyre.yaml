source: "Alan Eyre, 中东研究所（MEI）& JCPOA 谈判团队成员"
type: "individual"
last_verified: "2026-04-14"

lean: |
  奥巴马政府伊朗谈判团队核心成员，曾参与 2013-2015 JCPOA 多轮谈判。
  政策立场："冻结而非转变"——认为对话可能性存在，但不寄望于制度根本改革。

core_framework: |
  将伊朗问题理解为"可控冲突管理"框架。核心洞察：**霍尔木兹海峡控制权已替代核威慑，
  成为伊朗对美最有效的战略杠杆**。分析方法：通过剧本推演识别伊朗红线的真实位置，
  而非相信公开立场。关键拒绝：宣传战与实际谈判边界的模糊化。

key_concepts:
  - 霍尔木兹杠杆化：石油运输风险溢价可将伊朗威胁转化为全球经济筹码
  - 迭代磋商模式：每轮谈判后伊朗立场的微观调整往往比公开声明更具预测力
  - 第三方调停者角色的非对称风险：中介国承受的政治成本超过直接参与方

blind_spots: |
  过分信任"循环谈判"模式的可重复性。Khamenei 去世改变了权力同意的分布——
  Mojtaba 新政权的谈判授权边界与前任差异可能超过 Eyre 框架所能预测。
  对军方在新权力结构中的角色膨胀认识不足。

best_for:
  - 伊朗红线推演（基于谈判行为模式）
  - 霍尔木兹海峡威胁的全球供应链影响评估
  - 多边谈判中第三方角色的权力动态分析

not_for:
  - 伊朗内部权力继承的稳定性预测
  - 中俄对伊朗的实际支持深度与限度
  - 军事冲突升级时的伊朗决策过程

signal_vs_noise: |
  真信号：Eyre 对伊朗谈判团队内部分歧（强硬派 vs 务实派）的历史观察，
  这些细节可在外交电报中验证。噪声：他对"伊朗理性行为体"假设的坚持
  ——权力交接期这个假设的有效性大幅下降。

primary_urls:
