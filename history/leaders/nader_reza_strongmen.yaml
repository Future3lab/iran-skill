name: "纳迪尔·沙阿 + 礼萨·沙阿 / Nader Shah Afshar + Reza Shah Pahlavi"
era: "军事强人夺权者（18世纪 + 20世纪）"
reign: "Nader Shah 1736-1747 / Reza Shah 1925-1941"
type: "historical_mental_model"
note: "两人合并建模因为心智模型高度同构——军事能力→合法性→现代化独裁→继承危机"
last_updated: "2026-04-14"
source_books:
  - "Michael Axworthy, The Sword of Persia: Nader Shah (2006)"
  - "Abbas Amanat, Iran: A Modern History (2018)"
  - "Ervand Abrahamian, A History of Modern Iran (2008)"
  - "Stephanie Cronin, The Army and the Creation of the Pahlavi State in Iran (1997)"

mental_model: |
  核心逻辑：「武力 = 合法性」。
  
  纳迪尔·沙阿和礼萨·沙阿的心智模型几乎完全同构：
  1. 都是通过军事能力从底层崛起
  2. 都推翻了被认为「软弱」的前朝（萨法维残余 / 恺加王朝）
  3. 都试图通过快速现代化来证明统治合法性
  4. 都在外交上保持务实（即使有强烈的民族主义修辞）
  5. 都没有解决继承问题 → 死后/退位后政权迅速动摇
  
  关键公式：
  军事胜利 = 政治合法性（只要打胜仗，谁在乎你是什么出身）
  现代化 = 对外尊严的恢复（看，我们不比西方差）
  集中权力 = 效率（民主太慢，独裁快）
  但：独裁效率 + 继承真空 = 系统性脆弱

decision_heuristics:
  nader_shah:
    - "用军事胜利建立合法性 → 入侵印度莫卧儿帝国，带回巨额战利品"
    - "试图消解什叶派-逊尼派分裂 → 提出第五教派（Ja'fari 学派）→ 失败"
    - "用恐怖维持纪律 → 晚年变得偏执，大规模处决"
    - "帝国扩张的惯性停不下来 → 不断远征导致军队和国库耗竭"
  
  reza_shah:
    - "用军事政变夺权 → 但通过议会投票给自己加冕（合法化外衣）"
    - "快速西化：废除面纱、建铁路、创办大学、统一法律"
    - "利用古波斯（阿契美尼德）符号 → 把巴列维王朝与 2500 年帝国传统绑定"
    - "1935 年要求国际社会使用「Iran」而非「Persia」→ 国家品牌重塑"
    - "在二战中试图保持中立 → 失败，被英苏联合入侵并强制退位（1941）"

known_triggers:
  escalate:
    - "被视为「软弱」→ 必须以军事胜利回应（这是两人的共同致命按钮）"
    - "部落/地方权力挑战中央 → 暴力镇压（纳迪尔对阿富汗部落 / 礼萨对游牧部落定居化）"
  deescalate:
    - "外部压力绝对不可抗拒 → 被迫接受（纳迪尔从印度撤军 / 礼萨被迫退位）"
    - "（几乎没有主动降级的案例 → 军事强人的心理结构不允许「示弱」）"

red_lines:
  - "挑战军队的核心地位 → 不可容忍"
  - "外国军事占领伊朗领土 → 触发极端反应（但礼萨最终被迫接受）"

strategic_blind_spots:
  - "纳迪尔：偏执导致孤立 → 被自己的卫兵暗杀"
  - "礼萨：低估大国干预的决心 → 被英苏轻易推翻"
  - "两人共同：无法建立超越个人的制度 → 死后/退位后立即混乱"
  - "现代化 = 西化 的假设 → 忽视社会文化的抵抗力 → 最终反噬（1979革命）"

contemporary_mapping:
  direct_echoes:
    - pattern: "IRGC 政治化 = 纳迪尔/礼萨模式的制度化版本"
      link: |
        纳迪尔和礼萨都是「军人当国王」的模型。
        IRGC 的政治化是这个模型的集体版——
        不是一个军事强人夺权，而是一个军事机构集体夺权。
        
        2026 年 IRGC 推 Mojtaba 上位 = 
        纳迪尔式军事合法性 + 大流士式制度外壳 的混合。
        
        关键问题：Mojtaba 是 IRGC 的「国王」还是 IRGC 的「傀儡」？
        这决定了 C3 路径（权力重组）的概率。
      skill_variable: "IRGC 行为模型 / Mojtaba power_base / C3 路径"

    - pattern: "古波斯符号的政治化使用"
      link: |
        礼萨·沙阿把巴列维与阿契美尼德绑定 →
        伊斯兰共和国用什叶派殉道叙事替代 →
        但波斯帝国符号从未完全消失（伊朗新年 Nowruz、波斯波利斯的国家象征地位）。
        
        理解伊朗领导人时需要同时追踪两条合法性线索：
        1. 伊斯兰/什叶派线（官方）
        2. 波斯帝国线（文化底层，非官方但极其强大）
      skill_variable: "（新增维度，当前 skill 未覆盖）"

    - pattern: "强人退场后的继承危机"
      link: |
        纳迪尔被暗杀 → 50 年混乱 → 恺加崛起
        礼萨被迫退位 → 穆罕默德·礼萨勉强继位 → 1979 革命
        Khamenei Sr. 死于空袭 → Mojtaba 仓促继位 → ？
        
        模式是：强人在位时系统运转 → 强人消失后制度空白暴露。
        Mojtaba 面临的挑战和穆罕默德·礼萨一样：
        他继承的不是权力本身，而是一个为前任量身定制的系统。
      skill_variable: "Mojtaba evidence_quality / domestic-fragility 综合指数"

  anti_patterns:
    - "不要假设「军事强人」= 「有效统治者」→ 纳迪尔的军事天才没有阻止帝国在他死后立即崩溃"
    - "不要假设「现代化」= 「稳定」→ 礼萨的快速现代化恰恰制造了 1979 革命的条件"
    - "不要假设 IRGC 的军事能力 = IRGC 的政治治理能力 → 两种能力完全不同"

evidence_quality: "★★☆（纳迪尔的资料相对有限；礼萨的资料充分）"

honest_limits:
  - "纳迪尔·沙阿的内部决策过程几乎无一手资料"
  - "礼萨·沙阿被美化和妖魔化的程度都很高——真实面目需要批判性阅读"
  - "「军事强人」模型在不同时代的适用性有显著差异"
