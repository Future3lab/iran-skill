name: "恺加王朝诸王 / Qajar Dynasty Rulers"
era: "恺加王朝（帝国主义压力期）"
reign: "1789-1925"
type: "historical_mental_model"
focus: "纳赛尔丁·沙阿 (1848-1896) + 末代恺加诸王"
last_updated: "2026-04-14"
source_books:
  - "Abbas Amanat, Iran: A Modern History (2018)"
  - "Abbas Amanat, Pivot of the Universe: Nasir al-Din Shah and the Iranian Monarchy (1997)"
  - "John Ghazvinian, America and Iran: A History (2020)"
  - "Ervand Abrahamian, A History of Modern Iran (2008)"

mental_model: |
  恺加王朝的核心心智模型是「夹缝中的主权让渡」——
  面对英俄两大帝国的对冲压力，恺加诸王反复出卖主权来维持王位：
  石油特许权（1901 达西特许权）、烟草专卖权（1890）、铁路权、电报权...
  
  这不是「无能」——这是一个弱国统治者的理性选择：
  用经济主权换取政治存活。
  
  但这个选择的长期后果是灾难性的：
  - 民众形成了「统治者=出卖国家利益的人」的深层不信任
  - 「外国控制我们的资源」成为伊朗政治的永恒创伤
  - 任何涉及「主权让渡」的谈判（无论多小）都会被民众映射到恺加记忆上
  
  关键公式：
  主权让渡 → 短期王位保全 + 长期合法性崩溃
  经济依附 → 政治依附 → 最终被推翻

decision_heuristics:
  - "在英俄之间玩平衡 → 谁给的条件好就靠向谁（短期博弈）"
  - "用特许权换取现金 → 维持宫廷开支和军队忠诚（纳赛尔丁的核心策略）"
  - "对内改革的口号 > 实质改革 → 改革会动摇恺加自身的权力基础"
  - "1906 宪法革命迫使恺加接受议会 → 但随即在俄国支持下解散议会"
  - "1907 英俄瓜分伊朗 → 恺加政府完全没有被咨询 → 主权的最终羞辱"

known_triggers:
  escalate:
    - "民众叛乱（如 1891-92 烟草抗议）→ 最终屈服于民意，撤销特许权"
    - "外国直接军事干预 → 完全屈服（俄国 1911 炮轰议会 → 恺加配合）"
  deescalate:
    - "英俄同时施压 → 两边都给让步，试图维持平衡"
    - "民意高涨 → 象征性改革以疏导压力"

red_lines:
  - "理论上没有真正的红线 → 这正是恺加最终被推翻的原因"
  - "唯一的实际红线：任何直接威胁王位的行为（但连这条都反复被突破）"

strategic_blind_spots:
  - "无法理解「让渡经济主权」的长期政治后果"
  - "把英俄竞争当作保护而非威胁（「缓冲国幻觉」）"
  - "低估宗教机构（ulema）的政治动员能力 → 烟草抗议由 ulema 领导"
  - "假设改革可以在不改变权力结构的情况下进行"

contemporary_mapping:
  direct_echoes:
    - pattern: "「零浓缩」= 新版达西特许权"
      link: |
        当美国要求伊朗「零浓缩」时，伊朗决策层（从改革派到强硬派）
        的反应之所以如此一致和激烈，是因为这直接映射到恺加记忆：
        - 1901 达西石油特许权 = 让外国控制伊朗最重要的自然资源
        - 2026 零浓缩要求 = 让外国控制伊朗最重要的技术能力
        
        Mousavian 的「浓缩权利=民族主权」框架不是策略性立场，
        是 125 年创伤记忆的直接表达。
        
        任何要求伊朗「放弃」某种能力的谈判方案，
        都会被自动映射到恺加模式——即使谈判者本人没有意识到这一点。
      skill_variable: "Mousavian 框架 / Witkoff 谈判 / Araghchi 行为"

    - pattern: "对大国「保证」的结构性不信任"
      link: |
        恺加经验的核心教训：大国的承诺是靠不住的。
        - 英国承诺保护伊朗主权 → 1907 年与俄国瓜分伊朗
        - 美国承诺 JCPOA → 2018 年单方面退出
        
        这解释了 Parsi 的「1953 政变创伤使伊朗对美承诺折扣率 80%」——
        但折扣率的源头不是 1953，而是 1901-1907。
        
        伊朗的「不信任」不是非理性的——
        它是被反复验证的经验性结论。
      skill_variable: "Parsi 框架 / Vaez 框架 / 叙事矩阵议题1"

    - pattern: "宪法革命的未完成叙事"
      link: |
        1906 宪法革命 = 伊朗第一次现代民主尝试 → 被俄国+恺加联手镇压。
        这个「民主被外部势力中断」的模式在伊朗历史中反复出现：
        1906（宪法革命被俄国镇压）→ 1953（摩萨台被 CIA 推翻）→ 
        2009（绿色运动被内部镇压但被叙事为「西方煽动」）。
        
        每次民主尝试的失败都强化了一个叙事：
        「外部势力不允许伊朗自主选择政治制度」。
      skill_variable: "domestic-fragility 的政权合法性维度"

    - pattern: "弱国统治者的「两面讨好」困境"
      link: |
        恺加在英俄之间的「平衡术」→ 
        当代伊朗在中美之间的定位。
        skill 中习近平和普京的 bluff_rate（60-85%）
        正是恺加经验的当代版本：
        大国的「支持」永远是有条件的，
        当成本超过收益时，「盟友」会立即消失。
      skill_variable: "Xi/Putin bluff_rate / 中俄角色叙事"

  anti_patterns:
    - "不要用「恺加无能」来解释伊朗的不信任——恺加的选择在当时的约束条件下是理性的"
    - "不要低估「主权让渡」话语在伊朗政治中的动员力——这是跨派系共识"
    - "不要假设「经济利益」可以压倒「主权焦虑」——恺加证明了经济依附最终导致政治依附"

evidence_quality: "★★☆（历史研究充分，当代映射有多个分析师框架支撑）"

honest_limits:
  - "恺加内部决策的一手资料（宫廷文档）部分被销毁"
  - "「恺加记忆」在伊朗不同社会阶层中的影响力不均——城市知识分子 > 农村民众"
  - "当代伊朗人对恺加的认知可能更多来自学校教育而非直接记忆"
