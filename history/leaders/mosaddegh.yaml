name: "穆罕默德·摩萨台 / Mohammad Mosaddegh"
era: "石油国有化运动"
reign: "首相 1951-1953"
type: "historical_mental_model"
last_updated: "2026-04-14"
source_books:
  - "Ray Takeyh, The Last Shah (2021)"
  - "Stephen Kinzer, All the Shah's Men (2003)"
  - "Ervand Abrahamian, The Coup: 1953, the CIA, and the Roots of US-Iran Relations (2013)"
  - "John Ghazvinian, America and Iran (2020)"

mental_model: |
  摩萨台的核心逻辑是「资源主权=国家主权」。
  他不是革命者——他是一个宪政主义者，
  相信民选政府有权控制国家自然资源。
  石油国有化不是反西方运动——它是反帝国运动。
  
  但摩萨台的真正遗产不是他做了什么，
  而是他被推翻这件事本身——
  1953 年政变成为伊朗集体记忆中最强大的「叙事武器」：
  
  关键公式：
  民主实验 + 资源主权诉求 → 被外部势力暴力中断
  = 「美国永远不会允许伊朗真正独立」的结论
  = 对所有美国承诺的永久性折扣

decision_heuristics:
  - "合法性来自民意（议会投票国有化 → 不可撤销的民主授权）"
  - "国际法框架优先（在海牙国际法院打石油官司 → 相信制度而非武力）"
  - "不妥协主义（对英国的任何分成方案都拒绝 → 全有或全无）"
  - "低估暗处的威胁（相信美国会支持民主伊朗 → 致命误判）"
  - "民族动员作为政治资源（上街=权力展示 → 但也打开了民粹化的门）"

known_triggers:
  escalate:
    - "英国试图通过石油禁运迫使伊朗妥协 → 摩萨台更加强硬"
    - "国内反对派（王室+军方）联合施压 → 诉诸民意公投巩固权力"
  deescalate:
    - "（极少）→ 摩萨台的策略几乎没有降级出口，这是他最大的战略缺陷"

red_lines:
  - "石油主权不可谈判 → 任何让英伊石油公司回来的方案都被拒绝"
  - "沙阿不能干预民选政府 → 但最终恰恰是沙阿+CIA+MI6 推翻了他"

strategic_blind_spots:
  - "相信美国会站在民主一边 → 杜鲁门确实同情，但艾森豪威尔选择了冷战利益"
  - "低估英国情报机构（MI6）的操作能力"
  - "不妥协主义导致失去潜在盟友 → 一些伊朗温和派也转向反对他"
  - "过度依赖街头动员 → 当CIA 操纵街头反动员时，同样的工具被用来推翻他"

contemporary_mapping:
  direct_echoes:
    - pattern: "1953 = 所有美伊互不信任的源代码"
      link: |
        1953 年政变在伊朗集体记忆中的地位 = 
        美国独立战争在美国记忆中的地位——
        它定义了「我们是谁」和「我们为什么不信任他们」。
        
        skill 中 Parsi 的「对美承诺折扣率 80%」直接源于此：
        - JCPOA 被撕毁 → 「又一个 1953」
        - 任何新协议 → 「他们会不会再撕毁？」
        - 伊朗要求「不可逆的保证」→ 因为 1953 证明口头保证一文不值
        
        Vaez 的「伊朗的不信任是创伤后遗症」——
        1953 是这个创伤的急性发作点。
      skill_variable: "Parsi 框架 / Vaez 框架 / 所有涉及美伊信任的变量"

    - pattern: "「资源主权=国家主权」的直接传承"
      link: |
        摩萨台的石油国有化 → 伊朗核浓缩权利的立场。
        结构完全相同：
        - 1951：「伊朗石油属于伊朗人民」
        - 2026：「伊朗浓缩权利属于伊朗人民」
        
        当 Mousavian 说「零浓缩=政治自杀」时，
        他不是在描述一个政策立场——
        他在描述一个从 1951 年传承至今的民族信条。
        任何伊朗领导人（无论改革派还是强硬派）
        都不可能放弃浓缩权利，就像摩萨台不可能接受英伊石油公司回来。
      skill_variable: "Mousavian 框架 / Witkoff 的零浓缩要求"

    - pattern: "外部干预导致内部极端化的因果链"
      link: |
        1953 政变推翻民主政府 → 25 年巴列维独裁 → 1979 极端化革命。
        这个因果链是理解「为什么伊朗的政治选项如此极端」的关键：
        温和中间路线被外部干预反复消灭 → 
        只剩下极端选项（革命/独裁）能存活。
        
        当代映射：如果美国的「极限施压」再次消灭温和派的政治空间，
        结果不会是「伊朗投降」，而是「伊朗更极端化」。
        这是 1953 年的教训，但华盛顿反复忘记。
      skill_variable: "war-termination C 路径 / domestic-fragility"

    - pattern: "街头动员的双刃剑"
      link: |
        摩萨台用街头示威巩固权力 → CIA 用同样的工具推翻他。
        当代映射：2009 绿色运动 / 2022 头巾运动 → 
        政权既害怕街头动员（反政权），又依赖街头动员（反美示威）。
        这个矛盾直接源于 1953 的教训。
      skill_variable: "domestic-fragility 的 Basij 执行意愿变量"

  anti_patterns:
    - "不要假设「施压会让伊朗妥协」——1953 证明施压会让伊朗记住仇恨 70 年"
    - "不要假设伊朗的不信任是非理性的——它是被反复验证的经验性结论"
    - "不要低估「摩萨台叙事」在伊朗跨代传播的力量——学校教科书、电影、家庭叙事"

evidence_quality: "★★★（历史研究极为充分，CIA 已解密大量档案，多方验证）"

honest_limits:
  - "摩萨台本人的决策动机仍有争议（纯理想主义 vs 民粹机会主义）"
  - "Takeyh 的新研究挑战了「摩萨台=纯粹受害者」叙事，增加了复杂性"
  - "1953 在当代伊朗政治中的使用方式常被两方工具化（伊朗政权和美国鹰派各取所需）"
