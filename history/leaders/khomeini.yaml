name: "阿亚图拉·霍梅尼 / Ayatollah Ruhollah Khomeini"
era: "伊斯兰革命与伊斯兰共和国建立"
reign: "最高领袖 1979-1989"
type: "historical_mental_model"
last_updated: "2026-04-14"
source_books:
  - "Roy Mottahedeh, The Mantle of the Prophet (1985)"
  - "Shaul Bakhash, The Reign of the Ayatollahs (1984)"
  - "Afshon Ostovar, Vanguard of the Imam (2016)"
  - "Abbas Amanat, Iran: A Modern History (2018)"
  - "Narges Bajoghli, Iran Reframed (2019)"

mental_model: |
  霍梅尼的核心逻辑是「意志力 > 物质条件」。
  他从来不是一个战略家——他是一个意志的化身。
  在所有的决策节点上，他的计算不是「我们能不能赢」，
  而是「投降是否比死亡更糟」。答案永远是「是」。
  
  这不是疯狂——这是一种完全不同的「理性」：
  - 西方理性：成本-收益 → 选择收益最大化
  - 霍梅尼理性：尊严-屈辱 → 选择屈辱最小化
  
  关键公式：
  生存 = 胜利（只要政权没倒，就算赢了）
  物质损失 < 尊严损失（接受停火可以，接受投降不行）
  「喝毒酒」：承认失败但包装为胜利的技术

decision_heuristics:
  - "velayat-e faqih（法学家监护）= 把宗教权威转化为政治权力的制度创新"
  - "创建 IRGC 制衡正规军 → 永远不让任何一个武装力量垄断暴力"
  - "人质危机（1979-1981）= 用极端行动制造不可逆的对抗 → 消灭内部温和派的政治空间"
  - "两伊战争后期坚持进攻 → 意志 > 军事现实 → 最终不得不接受停火（「喝毒酒」）"
  - "遗嘱禁止 IRGC 参政 → 但这条遗训几乎立即被违反"

known_triggers:
  escalate:
    - "被解读为「软弱」的任何行为 → 必须以更极端的姿态回应"
    - "内部权力挑战（如 Bani-Sadr、MEK）→ 残酷镇压，不留空间"
    - "外部侮辱（如 Rushdie 事件）→ 发布 fatwa，把宗教权威武器化"
  deescalate:
    - "当物质条件绝对不允许继续时 → 「喝毒酒」（接受停火但绝不说投降）"
    - "内部精英形成共识「继续会毁灭一切」→ 从善如流但保留面子"

red_lines:
  - "任何动摇 velayat-e faqih 制度合法性的行为 → 必须消灭"
  - "任何可以被解读为「向西方投降」的外交行为 → 不可接受"
  - "军队不忠于革命 → 必须清洗（1980-81 军队大清洗）"

strategic_blind_spots:
  - "意志力不能替代战术 → 两伊战争的人海战术造成了不必要的巨大伤亡"
  - "制度设计的内在矛盾 → velayat-e faqih + 共和制选举 = 永远的权力张力"
  - "继承人问题 → 指定蒙塔泽里后又废黜，最终由 Khamenei 仓促接任"
  - "输出革命的幻觉 → 真主党/PMF 等代理人从未真正「复制」伊朗模式"

contemporary_mapping:
  direct_echoes:
    - pattern: "「生存即胜利」= 霍梅尼遗产的核心"
      link: |
        Takeyh 框架的根源就在这里：
        霍梅尼定义了「只要政权还在，就没有输」的游戏规则。
        这使得西方的威慑框架失效——
        因为你无法用「你会遭受巨大损失」来威慑一个
        把「承受巨大损失但活下来」定义为「胜利」的对手。
        
        2026 空战 42 天后，伊朗虽然遭受重大打击，
        但如果政权还在，IRGC 还在运作，
        那么在霍梅尼的框架下，伊朗就没有输。
      skill_variable: "Takeyh 框架 / war-termination 所有路径"

    - pattern: "「喝毒酒」模式 = 霍梅尼最重要的遗产"
      link: |
        1988 年接受停火 = 霍梅尼发明了「在承认失败的同时保留面子」的技术。
        这是理解伊朗如何退出当前冲突的关键——
        Mojtaba（或任何伊朗领导人）不可能「投降」，
        但可以「喝毒酒」：接受一个事实上的让步，但包装为胜利。
        
        当前 skill 的 A 路径（Trump 宣布胜利停火）之所以概率最高，
        正是因为它允许双方同时使用「喝毒酒」技术：
        Trump 说「伊朗屈服了」，伊朗说「我们保住了主权」。
      skill_variable: "war-termination A 路径 / Trump negotiation_style"

    - pattern: "IRGC = 霍梅尼最成功也最危险的制度遗产"
      link: |
        霍梅尼创建 IRGC 的原始目的：确保革命安全，制衡正规军。
        但他的遗嘱明确禁止 IRGC 参政——
        这条遗训的违反速度之快（几乎立即），
        说明了制度一旦创建就会发展出自身利益逻辑。
        
        2026 年 IRGC 主导 Mojtaba 的上位 =
        霍梅尼最害怕的场景的实现。
      skill_variable: "IRGC 行为模型 / Mojtaba power_base"

    - pattern: "人质危机模式 = 通过制造不可逆对抗消灭中间路线"
      link: |
        1979 人质危机的真正功能不是对美谈判，
        而是消灭伊朗国内的温和派政治空间——
        一旦与美国完全决裂，中间路线就不再可能。
        
        当代映射：如果 2026 冲突中伊朗做出某个不可逆的行为
        （如退出 NPT、核试验），那就是新版「人质危机」——
        目的不是对外升级，而是对内消灭谈判派的空间。
      skill_variable: "nuclear-calculus 公开突破路径 / escalation-ladder 9-10级"

  anti_patterns:
    - "不要用「成本-收益」框架分析霍梅尼传统的决策者——他们的计算单位是「尊严」不是「美元」"
    - "不要假设「施压会让伊朗投降」——霍梅尼证明了伊朗可以在极端压力下存活 8 年（两伊战争）"
    - "不要忽视「喝毒酒」出口——它是伊朗退出冲突的唯一可行路径"

evidence_quality: "★★★（大量一手资料、多方验证、学术共识高）"

honest_limits:
  - "霍梅尼的私人决策过程仍不完全透明——很多关键时刻只有事后回忆"
  - "「意志力>物质」的框架有被浪漫化的风险——两伊战争的人海战术是真实的人道灾难"
  - "当代伊朗领导人对霍梅尼遗产的继承方式各不相同——不能简单假设所有人都遵循霍梅尼逻辑"
