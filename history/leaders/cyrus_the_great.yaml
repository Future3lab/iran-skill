name: "居鲁士大帝 / Cyrus the Great"
era: "阿契美尼德帝国创建者"
reign: "约 550-530 BCE"
type: "historical_mental_model"
last_updated: "2026-04-14"
source_books:
  - "Abbas Amanat, Iran: A Modern History (2018)"
  - "Lloyd Llewellyn-Jones, Persians: The Age of The Great Kings (2022)"
  - "Ferdowsi, Shahnameh (Dick Davis 译)"
  - "Pierre Briant, From Cyrus to Alexander: A History of the Persian Empire (2002)"

# ============================================================
# 核心心智模型：包容性帝国 / Inclusive Empire
# ============================================================

mental_model: |
  居鲁士的核心决策逻辑是「征服后不毁灭，而是吸纳」。
  他不是从道德出发——而是从帝国效率出发：镇压叛乱的成本 > 给予地方自治的成本。
  这是一种冷静的成本-收益帝国管理术，后来被西方重新包装为「人权先驱」。

  关键公式：
  战略宽容 = 帝国稳定 = 降低治理成本 = 更多资源用于扩张

  居鲁士的「宽容」不是价值判断，而是管理工具。

decision_heuristics:
  - "征服一个民族后，第一步不是改造它，而是利用它现有的精英和制度"
  - "让被征服者保留宗教、语言、法律 → 他们就不会叛乱 → 你就能用更少的军队控制更大的领土"
  - "把自己包装为「解放者」而非「征服者」→ 巴比伦的犹太人、米底的贵族都成为合作者而非反抗者"
  - "权力的展示不是通过暴力，而是通过恩典（居鲁士圆柱 = 权力的软展示）"
  - "永远给对手一个体面的退出通道 → 投降者得到善待，抵抗者被消灭"

known_triggers:
  escalate:
    - "被征服者拒绝合作/叛乱 → 迅速且压倒性的军事回应（对吕底亚国王克罗伊斯的处置）"
    - "内部权力挑战 → 果断清除（与米底国王阿斯提阿格斯的战争）"
  deescalate:
    - "被征服者表示归顺意愿 → 立即给予自治权和尊严（巴比伦入城）"
    - "边疆部落表示和平共处 → 接受贡赋关系而非直接统治"

red_lines:
  - "挑战波斯王权的合法性 → 必须消灭（这不是可以谈判的）"
  - "叛乱扩散到帝国核心省份 → 必须快速镇压以防传染效应"

strategic_blind_spots:
  - "过度自信于「宽容模型」在边疆游牧民族中的适用性 → 最终在中亚马萨格泰人战役中阵亡"
  - "帝国扩张的惯性 > 风险评估 → 没有建立有效的战略收缩机制"

# ============================================================
# 当代映射
# ============================================================

contemporary_mapping:
  direct_echoes:
    - pattern: "「文明对话」话语"
      link: |
        伊朗领导层（从哈塔米到鲁哈尼）反复使用「文明对话」框架，
        这不仅仅是外交辞令——它根植于居鲁士式的「多元帝国管理术」传统。
        理解这一点可以避免把伊朗的和平话语简单解读为「虚伪」或「软弱」。
      skill_variable: "Vaez 框架 / Mousavian 框架"

    - pattern: "给对手留退路"
      link: |
        居鲁士的「给投降者体面退出通道」→ 伊朗在核谈判中反复强调「需要面子」。
        当 Witkoff 要求「零浓缩」时，伊朗的拒绝不仅仅是技术立场——
        它违反了波斯政治文化中「双方都必须保留尊严」的深层规则。
      skill_variable: "Witkoff negotiation_style / Araghchi authorization_limit"

    - pattern: "帝国管理的中央-地方张力"
      link: |
        居鲁士的总督制（satrapy）→ 今天 IRGC vs 正规军 vs 总统的多头治理。
        中央集权 + 地方自治的张力管理是 2500 年的老问题。
      skill_variable: "IRGC internal split 变量 / domestic-fragility"

  anti_patterns:
    - "不要假设伊朗的「宽容话语」等于「准备让步」——居鲁士的宽容是权力工具，不是软弱信号"
    - "不要假设伊朗无法管理多元利益——他们有 2500 年的多民族帝国管理经验"

evidence_quality: "★☆☆（历史类比，非直接行为数据）"

honest_limits:
  - "居鲁士的真实动机无法从现代视角确定——「人权先驱」叙事是现代建构"
  - "从公元前 6 世纪到公元 2026 年的映射必然是高度简化的"
  - "当代伊朗领导人是否有意识地参照居鲁士模型无法确认"
