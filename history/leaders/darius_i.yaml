name: "大流士一世 / Darius I (the Great)"
era: "阿契美尼德帝国制度化者"
reign: "522-486 BCE"
type: "historical_mental_model"
last_updated: "2026-04-14"
source_books:
  - "Abbas Amanat, Iran: A Modern History (2018)"
  - "Pierre Briant, From Cyrus to Alexander (2002)"
  - "A.T. Olmstead, History of the Persian Empire (1948)"

mental_model: |
  大流士的核心逻辑是「用制度替代个人」。居鲁士靠魅力征服，大流士靠系统巩固。
  他是帝国的「操作系统架构师」：总督制、御道、邮政系统、统一度量衡、法典编纂。
  
  关键公式：
  制度化治理 = 降低人事风险 = 帝国可持续性
  军政分离（总督管民政，将军管军事）= 防止地方独立

  大流士的天才在于：他通过制度设计让帝国不依赖于任何一个人的能力。

decision_heuristics:
  - "权力不能依赖个人忠诚，必须依赖制度约束 → 总督制的核心是「让地方官有权但无法独立」"
  - "信息就是权力 → 帝国邮政系统（angareion）让中央可以在 7 天内获知帝国任何角落的动态"
  - "法律统一但执行灵活 → 让被征服民族编纂自己的法律（如埃及法典），但在帝国框架内运作"
  - "通过建设投资赢得被征服者的合作 → 修路、灌溉、贸易保护 = 帝国的正当性来源"
  - "篡位者的逻辑：通过「贝希斯敦铭文」把自己的非法夺权重新叙事为合法继承"

known_triggers:
  escalate:
    - "总督叛乱 → 立即军事镇压 + 替换总督 + 收紧监控（派「国王之眼」巡查官）"
    - "边疆挑衅（如希腊城邦支持叛乱）→ 大规模远征以示力量投射"
  deescalate:
    - "被征服者主动合作 → 立即给予经济利益（贸易特权、税收减免）"
    - "远征成本过高 → 愿意接受「名义臣服」而非实质控制（如斯基泰远征后的收缩）"

red_lines:
  - "挑战帝国的叙事合法性 → 不可容忍（贝希斯敦铭文=官方真理，挑战等于叛乱）"
  - "总督同时掌握军权和民权 → 必须拆分（这是制度设计的底线）"

strategic_blind_spots:
  - "过度远征：对希腊的马拉松战役失败 → 帝国资源投入到不必要的边缘战争"
  - "制度僵化风险：后继者无法像他一样灵活运用制度 → 制度变成官僚惰性"

contemporary_mapping:
  direct_echoes:
    - pattern: "Khamenei Sr. 的制度建设"
      link: |
        Khamenei Sr. 40 年来构建的 velayat-e faqih + IRGC + Basij + 监护委员会 + 
        专家委员会 + 总统制 的多层治理体系，和大流士的总督制在结构逻辑上高度同构：
        - 军政分离（IRGC 管安全，总统管行政）
        - 「国王之眼」= 情报部（MOIS）+ IRGC 情报局的双轨监控
        - 地方自治但中央控制的信息权和任命权
        Khamenei 本质上是大流士式的「制度建设者」，而非霍梅尼式的「魅力革命者」。
      skill_variable: "domestic-fragility 的所有变量"

    - pattern: "篡位者的叙事重构"
      link: |
        大流士通过贝希斯敦铭文把自己的政变重新叙事为「恢复合法秩序」→
        Mojtaba 通过 IRGC 主导的选举把自己的上位重新叙事为「合法继承」。
        两者的结构逻辑完全相同：掌权后的第一优先级是控制叙事，而非军事巩固。
      skill_variable: "Mojtaba 合法性 / bias-check 议题4"

    - pattern: "帝国过度扩张的教训"
      link: |
        大流士对希腊的远征 → 伊朗在叙利亚/伊拉克/也门的代理人网络扩张。
        当代理人成本 > 战略收益时，帝国面临资源透支。
        2026 年战后代理人网络已被显著削弱，这是大流士式过度扩张的当代版本。
      skill_variable: "代理人网络状态 / Nasr 框架"

  anti_patterns:
    - "不要假设 IRGC 是「混乱的军阀」——它是一个高度制度化的组织，类似大流士的总督系统"
    - "不要假设 Mojtaba 的合法性问题会自动导致权力崩溃——大流士也是篡位者，但帝国运转了 200 年"

evidence_quality: "★☆☆（历史类比）"

honest_limits:
  - "大流士的制度细节主要来自他自己的铭文（自我美化），波斯帝国的内部运作细节有限"
  - "从总督制到 IRGC 体制的映射是结构性类比，不是因果关系"
